<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Island Grid — Singapore Energy Intelligence</title>
<script src="config.js"></script>
<script>
  // pick the GL library by token: Mapbox when MAPBOX_TOKEN is set, MapLibre otherwise
  const USE_MAPBOX = typeof MAPBOX_TOKEN !== "undefined" && !!MAPBOX_TOKEN;
  const GL_LIB = USE_MAPBOX
    ? { js: "https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.js",
        css: "https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.css" }
    : { js: "https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js",
        css: "https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" };
  document.write(`<link href="${GL_LIB.css}" rel="stylesheet">` +
    `<script src="${GL_LIB.js}"><\/script>`);
</script>
<style>
:root {
  --cyan: #38e1d6; --amber: #ffb84d; --violet: #8c9aff;
  --text: #eaf6f8; --muted: #7e93a3;
}
html, body { margin: 0; height: 100%; background: #05080d; overflow: hidden;
  font-family: "Space Grotesk", "Avenir Next", -apple-system, "Segoe UI", system-ui, sans-serif;
  color: var(--text); }
#map { position: absolute; inset: 0; }
.maplibregl-ctrl-attrib { background: rgba(5,8,13,.5) !important; }
.maplibregl-ctrl-attrib a { color: #5a6b78 !important; font-size: 10px; }
#vignette { position: absolute; inset: 0; pointer-events: none; z-index: 5;
  box-shadow: inset 0 0 220px 40px rgba(0,0,0,.45); }

/* title */
/* persistent page header — this is a product page, not a film */
#brand { position: absolute; top: 18px; left: 22px; z-index: 15; pointer-events: none;
  background: rgba(8, 14, 22, .72); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(120, 200, 220, .16); border-radius: 10px; padding: 10px 16px; }
#brand img { display: block; height: 20px; width: auto; margin-bottom: 6px;
  filter: drop-shadow(0 0 10px rgba(56, 225, 214, .25)); }
#brand .b1 { font-size: 11.5px; font-weight: 600; color: #dfeef2; letter-spacing: .14em; }
#brand .b2 { font-size: 10px; letter-spacing: .22em; color: var(--muted);
  text-transform: uppercase; margin-top: 3px; }

/* cinematic captions */
#caption { position: absolute; left: 50%; bottom: 10%; transform: translateX(-50%);
  max-width: 880px; width: 92vw; text-align: center; z-index: 10; pointer-events: none; }
#caption .line { font-size: clamp(17px, 2.1vw, 26px); font-weight: 500; letter-spacing: .06em;
  line-height: 1.5; color: var(--text); opacity: 0; transform: translateY(14px);
  transition: opacity .9s ease, transform .9s cubic-bezier(.16,1,.3,1);
  text-shadow: 0 2px 24px rgba(0,0,0,.95), 0 0 40px rgba(56,225,214,.18); }
#caption .line.in { opacity: 1; transform: translateY(0); }
#caption .line em { font-style: normal; color: var(--cyan); }
#caption .line b { font-weight: 600; color: var(--amber); }

/* DATA / OUTCOME floating side panels — sci-fi HUD cards, content follows the storyline */
.side { position: absolute; top: 50%; width: 276px; z-index: 11; pointer-events: none;
  padding: 18px 18px 16px; overflow: hidden;
  background: linear-gradient(165deg, rgba(12, 22, 34, .88), rgba(7, 13, 21, .72));
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(86, 225, 230, .3);
  clip-path: polygon(16px 0, 100% 0, 100% calc(100% - 16px), calc(100% - 16px) 100%, 0 100%, 0 16px);
  box-shadow: 0 0 36px rgba(56, 225, 214, .14), inset 0 0 30px rgba(56, 225, 214, .05);
  opacity: 0; transition: opacity .7s ease, transform .7s cubic-bezier(.16,1,.3,1); }
#panel-data { left: 26px; transform: translate(-18px, -50%); }
#panel-outcome { right: 26px; transform: translate(18px, -50%); }
.side.in { opacity: 1; transform: translate(0, -50%); }
.side::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--cyan), transparent);
  background-size: 200% 100%; animation: hud-shimmer 3s linear infinite; }
#panel-outcome::before { background: linear-gradient(90deg, transparent, var(--amber), transparent);
  background-size: 200% 100%; }
.side::after { content: ""; position: absolute; left: 0; right: 0; height: 34%;
  top: -40%; pointer-events: none;
  background: linear-gradient(180deg, transparent, rgba(140, 255, 246, .07), transparent);
  animation: hud-scan 4.5s ease-in-out infinite; }
@keyframes hud-shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }
@keyframes hud-scan { 0% { top: -40%; } 60%, 100% { top: 110%; } }
.side .s-head { font-size: 10.5px; letter-spacing: .26em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
.side .s-head::before { content: ""; width: 7px; height: 7px; border-radius: 50%;
  background: var(--cyan); box-shadow: 0 0 10px var(--cyan);
  animation: livepulse 1.4s ease-in-out infinite; }
@keyframes livepulse { 50% { opacity: .3; } }
#panel-outcome .s-head::before { background: var(--amber); box-shadow: 0 0 10px var(--amber); }
.side .s-head b { color: var(--cyan); font-weight: 700; }
#panel-outcome .s-head b { color: var(--amber); }
.side .s-mod { display: inline-block; font-size: 12px; font-weight: 700; color: #05121a;
  letter-spacing: .08em; margin-bottom: 12px; padding: 4px 12px;
  background: linear-gradient(90deg, var(--cyan), #7ffcf0);
  box-shadow: 0 0 18px rgba(56, 225, 214, .45);
  clip-path: polygon(6px 0, 100% 0, calc(100% - 6px) 100%, 0 100%); }
#panel-outcome .s-mod { background: linear-gradient(90deg, var(--amber), #ffd9a0);
  box-shadow: 0 0 18px rgba(255, 184, 77, .45); }
.side ul { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 7px; }
.side li { font-size: 13px; line-height: 1.4; color: var(--text);
  padding: 6px 9px 6px 11px; border-left: 2px solid transparent; border-radius: 3px;
  opacity: 0; transform: translateX(-16px);
  transition: opacity .5s ease, transform .5s cubic-bezier(.16,1,.3,1); }
#panel-outcome li { transform: translateX(16px); }
.side.in li { opacity: 1; transform: translateX(0); }
.side.in li.dim { opacity: .28; }
.side li:not(.dim) { border-left-color: var(--cyan);
  background: linear-gradient(90deg, rgba(56, 225, 214, .14), rgba(56, 225, 214, .02));
  box-shadow: inset 1px 0 8px rgba(56, 225, 214, .12); }
#panel-outcome li:not(.dim) { border-left-color: var(--amber);
  background: linear-gradient(90deg, rgba(255, 184, 77, .15), rgba(255, 184, 77, .02));
  box-shadow: inset 1px 0 8px rgba(255, 184, 77, .12); }
.side li .t { font-weight: 600; letter-spacing: .02em; }
.side li:not(.dim) .t::after { content: "\25C2 LIVE"; float: right; font-size: 8.5px;
  letter-spacing: .18em; color: var(--cyan); opacity: .85; margin-top: 3px; }
#panel-outcome li:not(.dim) .t::after { content: "\25B8"; color: var(--amber); font-size: 11px; }
.side li small { display: block; font-size: 11px; color: var(--muted); margin-top: 2px;
  line-height: 1.4; }

/* OUTCOME panel — a full hologram: swings in as a 3D plate with overshoot, then
   keeps breathing in perspective while its glow pulses like a projector */
#panel-outcome.in {
  animation: holo-in 1.1s cubic-bezier(.16, 1.3, .3, 1) both,
             holo-panel 7s ease-in-out 1.1s infinite; }
@keyframes holo-in {
  0%   { opacity: 0; transform: translate(120px, -50%) perspective(900px) rotateY(-55deg) scale(.82); }
  60%  { opacity: 1; }
  78%  { transform: translate(-8px, -50%) perspective(900px) rotateY(4deg) scale(1.02); }
  100% { transform: translate(0, -50%) perspective(900px) rotateY(-8deg) scale(1); } }
@keyframes holo-panel {
  0%, 100% { transform: translate(0, -50%) perspective(900px) rotateY(-8deg) translateZ(0);
    box-shadow: 0 0 36px rgba(255, 184, 77, .16), inset 0 0 30px rgba(255, 184, 77, .05); }
  50%      { transform: translate(0, -50%) perspective(900px) rotateY(2deg) translateZ(14px);
    box-shadow: 0 0 68px rgba(255, 184, 77, .38), inset 0 0 44px rgba(255, 184, 77, .1); } }
#panel-outcome ul { perspective: 520px; }
#panel-outcome li { transform: translateX(96px) rotateY(-92deg) scale(.7);
  transform-origin: right center; transform-style: preserve-3d; position: relative;
  transition: opacity .7s ease, transform 1s cubic-bezier(.16, 1.5, .3, 1); }
#panel-outcome.in li { transform: translateX(0) rotateY(0) scale(1); }
/* live cards levitate — z-lift, tumble and tilt like plates suspended in a field */
#panel-outcome li:not(.dim) > div { animation: holo-float 3.2s ease-in-out infinite;
  transform-style: preserve-3d; }
#panel-outcome li:not(.dim):nth-child(even) > div { animation-delay: -1.6s; }
@keyframes holo-float {
  0%, 100% { transform: translateZ(0) rotateX(0) rotateY(0); }
  33%      { transform: translateZ(22px) rotateX(6deg) rotateY(-3deg); }
  66%      { transform: translateZ(10px) rotateX(-3deg) rotateY(2.5deg); } }
#panel-outcome li:not(.dim)::after { content: ""; position: absolute; inset: 0;
  pointer-events: none;
  background: linear-gradient(112deg, transparent 30%, rgba(255, 226, 168, .45) 48%,
    transparent 62%);
  background-size: 260% 100%; animation: holo-sheen 2.1s linear infinite; }
@keyframes holo-sheen { from { background-position: 190% 0; } to { background-position: -90% 0; } }
#panel-outcome li:not(.dim) { animation: holo-glow 2.2s ease-in-out infinite; }
#panel-outcome li:not(.dim):nth-child(even) { animation-delay: -1.1s; }
@keyframes holo-glow {
  0%, 100% { box-shadow: inset 1px 0 8px rgba(255, 184, 77, .14), 0 0 0 rgba(255, 184, 77, 0); }
  50%      { box-shadow: inset 1px 0 18px rgba(255, 184, 77, .34),
    0 10px 30px rgba(255, 184, 77, .42), 0 0 14px rgba(255, 214, 140, .25); } }
#panel-outcome li:not(.dim) .t { color: #ffe9c4; text-shadow: 0 0 14px rgba(255, 184, 77, .6); }
#panel-outcome li:not(.dim) .t::after { display: inline-block;
  animation: coin-spin 2.8s cubic-bezier(.5, 0, .3, 1) infinite; }
@keyframes coin-spin { 0% { transform: rotateY(0); } 55%, 100% { transform: rotateY(360deg); } }

/* headline figures — molten-gold gradient with a running shine, counter pops */
#panel-outcome li .stat { font-size: 28px; font-weight: 800; line-height: 1.15;
  margin: 3px 0 1px; letter-spacing: .01em; font-variant-numeric: tabular-nums;
  background: linear-gradient(100deg, #ffbe66 15%, #fff3d2 38%, #ffd88f 55%, #ffb84d 80%);
  background-size: 220% 100%; -webkit-background-clip: text; background-clip: text;
  color: transparent; animation: stat-shine 2.4s linear infinite;
  filter: drop-shadow(0 0 16px rgba(255, 184, 77, .55)); }
@keyframes stat-shine { from { background-position: 160% 0; } to { background-position: -60% 0; } }

/* trust line at the foot of the OUTCOME panel — why the client should believe */
#panel-outcome .s-proof { margin-top: 12px; padding-top: 9px; font-size: 10.5px;
  line-height: 1.55; color: #ffd9a0; letter-spacing: .03em; font-style: italic;
  border-top: 1px dashed rgba(255, 184, 77, .3); }

/* DATA panel ontology graph — domains as nodes wired into one hub */
#onto { display: block; width: 100%; margin: 2px 0 8px; }
#onto .edge { stroke: rgba(140, 210, 220, .13); stroke-width: 1; fill: none; }
#onto .edge.on { stroke: rgba(73, 255, 239, .55); stroke-width: 1.4;
  stroke-dasharray: 5 7; animation: onto-flow 1.1s linear infinite; }
@keyframes onto-flow { to { stroke-dashoffset: -12; } }
#onto .nd { fill: #22333f; stroke: rgba(140, 210, 220, .3); stroke-width: 1; }
#onto .nd.on { fill: var(--cyan); stroke: rgba(160, 255, 248, .9);
  filter: drop-shadow(0 0 5px rgba(73, 255, 239, .9));
  animation: onto-pulse 1.6s ease-in-out infinite; }
@keyframes onto-pulse { 50% { filter: drop-shadow(0 0 11px rgba(73, 255, 239, 1)); } }
#onto .lbl { font-size: 11px; font-weight: 600; fill: rgba(190, 210, 218, .38);
  letter-spacing: .04em; }
#onto .lbl.on { fill: #eafffc; }
#onto .leaf { font-size: 8.5px; fill: rgba(73, 255, 239, .85); letter-spacing: .06em; }
#onto .hub { fill: rgba(56, 225, 214, .1); stroke: var(--cyan); stroke-width: 1.2;
  filter: drop-shadow(0 0 8px rgba(56, 225, 214, .5)); }
#onto .hub-ring { fill: none; stroke: rgba(73, 255, 239, .35); stroke-width: 1;
  stroke-dasharray: 3 5; transform-origin: 120px 96px; animation: onto-spin 14s linear infinite; }
@keyframes onto-spin { to { transform: rotate(360deg); } }
#onto .hub-t { font-size: 9.5px; font-weight: 700; fill: #eafffc; letter-spacing: .1em;
  text-anchor: middle; }
#onto .hub-s { font-size: 7px; fill: rgba(160, 230, 235, .7); letter-spacing: .3em;
  text-anchor: middle; }
#onto .pulse { fill: #bffff8; filter: drop-shadow(0 0 4px rgba(73, 255, 239, 1)); }

/* location tag (small eyebrow above captions during close-ups) */
#loctag { position: absolute; left: 50%; bottom: calc(10% + 74px); transform: translateX(-50%);
  font-size: 11px; letter-spacing: .3em; text-transform: uppercase; color: var(--amber);
  z-index: 10; opacity: 0; transition: opacity .8s ease; pointer-events: none;
  text-shadow: 0 2px 16px rgba(0,0,0,.9); }
#loctag.in { opacity: .95; }

/* finale */
#finale { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center;
  justify-content: center; text-align: center; z-index: 12; pointer-events: none;
  background: rgba(3,6,10,.45); opacity: 0; transition: opacity 1.4s ease; }
#finale.in { opacity: 1; }
#finale h2 { font-size: clamp(28px, 4vw, 54px); font-weight: 700; margin: 0 0 14px; color: #fff;
  letter-spacing: .02em; text-shadow: 0 0 50px rgba(56,225,214,.4); }
#finale .tag { color: var(--muted); font-size: clamp(13px, 1.5vw, 17px); letter-spacing: .1em;
  margin-bottom: 42px; }
#outcomes-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px 30px;
  margin-bottom: 38px; }
#outcomes-row span { font-size: 17px; font-weight: 600; color: var(--cyan); letter-spacing: .06em;
  display: flex; align-items: center; gap: 10px; }
#outcomes-row span::after { content: "·"; color: var(--muted); margin-left: 20px; }
#outcomes-row span:last-child::after { content: ""; }
#clients { display: flex; flex-wrap: wrap; justify-content: center; gap: 14px 34px; max-width: 900px; }
#clients span { font-size: 15px; letter-spacing: .18em; text-transform: uppercase; color: var(--text);
  opacity: 0; transform: translateY(10px); transition: opacity .6s ease, transform .6s ease;
  display: flex; align-items: center; gap: 10px; }
#clients span::before { content: ""; width: 5px; height: 5px; border-radius: 50%;
  background: var(--cyan); box-shadow: 0 0 8px var(--cyan); }
#clients span.in { opacity: .95; transform: translateY(0); }

/* Changi / CBD DOM bloom */
.bloom { position: absolute; border-radius: 50%; pointer-events: none; z-index: 8;
  transform: translate(-50%,-50%) scale(0); transition: transform 1.4s ease; }
.bloom.on { transform: translate(-50%,-50%) scale(1); }
#bloom-changi { width: 420px; height: 420px;
  background: radial-gradient(circle, rgba(255,184,77,.30) 0%, rgba(255,184,77,.10) 40%, transparent 70%); }
#bloom-cbd { width: 520px; height: 520px;
  background: radial-gradient(circle, rgba(0,255,240,.22) 0%, rgba(56,225,214,.08) 42%, transparent 70%); }

/* explore mode: grab the map any time — the tour pauses, assets are clickable */
#resume { position: absolute; bottom: 34px; left: 50%; transform: translateX(-50%);
  background: rgba(255, 184, 77, .1); color: var(--amber); border: 1px solid rgba(255, 184, 77, .5);
  border-radius: 26px; padding: 11px 30px; font-size: 13px; letter-spacing: .18em; cursor: pointer;
  font-family: inherit; text-transform: uppercase; z-index: 21; opacity: 0; pointer-events: none;
  transition: opacity .5s ease, background .3s; }
#resume.in { opacity: 1; pointer-events: auto; }
#resume:hover { background: rgba(255, 184, 77, .22); }
#sitecard { position: absolute; left: 50%; bottom: 96px; transform: translate(-50%, 12px);
  min-width: 260px; max-width: 420px; padding: 14px 20px; z-index: 20; pointer-events: none;
  background: linear-gradient(165deg, rgba(12, 22, 34, .92), rgba(7, 13, 21, .8));
  border: 1px solid rgba(86, 225, 230, .35); backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  clip-path: polygon(12px 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%, 0 12px);
  box-shadow: 0 0 30px rgba(56, 225, 214, .18);
  opacity: 0; transition: opacity .45s ease, transform .45s cubic-bezier(.16,1,.3,1); }
#sitecard.in { opacity: 1; transform: translate(-50%, 0); }
#sitecard h4 { margin: 0 0 4px; font-size: 15px; color: #fff; letter-spacing: .05em; }
#sitecard h4::before { content: "◉ "; color: var(--cyan); }
#sitecard .sc-sub { font-size: 10.5px; letter-spacing: .2em; text-transform: uppercase;
  color: var(--cyan); margin-bottom: 6px; }
#sitecard .sc-live { font-size: 11px; color: var(--muted); line-height: 1.5; }
#sitecard .sc-live b { color: #ffe9c4; font-weight: 600; }
#sitecard .m-grid { display: grid; grid-template-columns: 1fr auto; gap: 4px 20px;
  margin-top: 9px; }
#sitecard .m-grid .k { font-size: 10px; color: var(--muted); letter-spacing: .08em;
  text-transform: uppercase; align-self: center; }
#sitecard .m-grid .v { font-size: 12.5px; color: #bffff6; font-weight: 600;
  text-align: right; font-variant-numeric: tabular-nums; }
#sitecard .sc-note { margin-top: 9px; font-size: 9px; color: rgba(160, 185, 195, .5);
  letter-spacing: .16em; text-transform: uppercase; }

/* standing invitation to interact — this is an app, not a video */
#hint { position: absolute; bottom: 20px; left: 24px; z-index: 20; pointer-events: none;
  font-size: 10px; letter-spacing: .18em; text-transform: uppercase;
  color: var(--muted); opacity: .75; text-shadow: 0 1px 8px rgba(0,0,0,.8); }
#hint b { color: var(--cyan); font-weight: 600; }

/* controls */
#replay { position: absolute; bottom: 34px; left: 50%; transform: translateX(-50%);
  background: rgba(56,225,214,.08); color: var(--cyan); border: 1px solid rgba(56,225,214,.45);
  border-radius: 26px; padding: 11px 34px; font-size: 13px; letter-spacing: .2em; cursor: pointer;
  font-family: inherit; text-transform: uppercase; z-index: 20; opacity: 0; pointer-events: none;
  transition: opacity 1s ease, background .3s; }
#replay.in { opacity: 1; pointer-events: auto; }
#replay:hover { background: rgba(56,225,214,.2); }
#skip { position: absolute; bottom: 20px; right: 24px; background: none; border: none;
  color: var(--muted); font-family: inherit; font-size: 11px; letter-spacing: .18em;
  text-transform: uppercase; cursor: pointer; z-index: 20; opacity: .55; }
#skip:hover { opacity: 1; color: var(--cyan); }

@media (prefers-reduced-motion: reduce) {
  * { transition-duration: .01s !important; animation-duration: .01s !important; }
}
</style>
</head>
<body>
<div id="map"></div>
<div id="vignette"></div>
<div id="bloom-changi" class="bloom"></div>

    `<li style="transition-delay:${300 + i * 130}ms">
      <div><div class="t">${t}</div><small>${p.data[t]}</small></div></li>`).join("");
  // OUTCOME panel: the slide's four outcomes, live ones highlighted
  const oEl = $("#panel-outcome");
  oEl.querySelector(".s-mod").textContent = p.mod;
  oEl.querySelector("ul").innerHTML = OUTCOME_ITEMS.map((t, i) => {
    const o = p.outcome[t];
    return `<li class="${o ? "" : "dim"}" style="transition-delay:${200 + i * 110}ms">
      <div><div class="t">${t}</div>${o ?
        `<div class="stat" data-n="${o.stat}"></div><small>${o.sub}</small>` : ""}</div></li>`;
  }).join("");
  oEl.querySelector(".s-proof").innerHTML = p.proof ? `◆ ${p.proof}` : "";
  // the headline figures count up from zero — numbers that MOVE get believed
  oEl.querySelectorAll(".stat[data-n]").forEach((el) => {
    const raw = el.dataset.n;
    const m = raw.match(/([\d,]+(?:\.\d+)?)/);
    if (!m) { el.textContent = raw; return; }
    const target = parseFloat(m[1].replace(/,/g, ""));
    const dec = (m[1].split(".")[1] || "").length;
    const grouped = m[1].includes(",");
    const t0 = performance.now(), wait = 500, len = 1500;
    (function tick(now) {
      const q = clamp((now - t0 - wait) / len, 0, 1);
      const v = target * (1 - Math.pow(1 - q, 3));
      el.textContent = raw.replace(m[1], grouped
        ? Math.round(v).toLocaleString("en-US")
        : v.toFixed(dec));
      if (q < 1 && el.isConnected) requestAnimationFrame(tick);
    })(t0);
  });
  [dEl, oEl].forEach((el) => {
    el.classList.remove("in");
    requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add("in")));
  });
}

function arcCoords(h, a, steps = 56) {
  const dx = a[0] - h[0], dy = a[1] - h[1];
  const d = Math.hypot(dx, dy) || 1e-9;
  const nx = -dy / d, ny = dx / d, k = 0.26 * d;
  const c = [(h[0] + a[0]) / 2 + nx * k, (h[1] + a[1]) / 2 + ny * k];
  const pts = [];
  for (let i = 0; i <= steps; i++) {
    const t = i / steps, u = 1 - t;
    pts.push([u*u*h[0] + 2*u*t*c[0] + t*t*a[0], u*u*h[1] + 2*u*t*c[1] + t*t*a[1]]);
  }
  return pts;
}

      .sort((a, b) => a.d - b.d)
      .slice(0, 3)
      .forEach(({ j }) => {
        const key = Math.min(i, j) + "-" + Math.max(i, j);
        if (!seen.has(key)) { seen.add(key); edges.push([i, j]); }
      });
  });
  return edges;
})();

const SYN = (() => {
  const feats = [];
  const rnd = (i, n) => { const x = Math.sin(i * 12.9898 + n * 78.233) * 43758.5453;
    return x - Math.floor(x); };
  const push = (siteId, ring, H) => {
    feats.push({ type: "Feature",
      properties: { site: siteId, h: H, b: 0, kind: "body", tone: "cyan" },
      geometry: { type: "Polygon", coordinates: [ring] } });
    feats.push({ type: "Feature",
      properties: { site: siteId, h: H + 45, b: H, kind: "cap", tone: "cyan" },
      geometry: { type: "Polygon", coordinates: [ring] } });
  };
  ALL_SITES.forEach((s) => {
    const real = REAL_BLD[s.id] || [];
    if (real.length) {
      const cent = (r) => {
        let x = 0, y = 0;
        r.forEach((p) => { x += p[0]; y += p[1]; });
        return [x / r.length, y / r.length];
      };
      const area = (r) => { // m², shoelace on degree coords
        let a = 0;
        for (let i = 0; i < r.length - 1; i++)
          a += r[i][0] * r[i + 1][1] - r[i + 1][0] * r[i][1];
        return Math.abs(a / 2) * 110574 * 110574;
      };
      const withC = real.map((b) => ({ ...b, c: cent(b.r) }));
      withC.sort((a, b) =>
        Math.hypot(a.c[0] - s.coords[0], a.c[1] - s.coords[1]) -
        Math.hypot(b.c[0] - s.coords[0], b.c[1] - s.coords[1]));
      withC.forEach((b, idx) => {
        // per-building scale targets a readable ~300 m visual width, so a
        // slim tower fattens more than a huge terminal hall
        const S = clamp(300 / Math.sqrt(area(b.r) || 1), 1.6, 7.5);
        // nearest building recentres onto the site (the label rides its roof);
        // the others keep their true offsets, spread out with the cluster
        const P = 3.0;
        const anchor = idx === 0 ? s.coords :
          [s.coords[0] + (b.c[0] - s.coords[0]) * P,
           s.coords[1] + (b.c[1] - s.coords[1]) * P];
        const ring = b.r.map((p) => [
          anchor[0] + (p[0] - b.c[0]) * S,
          anchor[1] + (p[1] - b.c[1]) * S]);

      });

      // no mapped buildings here (port aprons, runways) — one clean prism
      const half = (170 + rnd(s.id, 2) * 110) / 110574;
      const h = 620 + rnd(s.id, 3) * 520;
      const a = rnd(s.id, 9) * Math.PI / 2;
      const rot = (dx, dy) => [s.coords[0] + dx * Math.cos(a) - dy * Math.sin(a),
        s.coords[1] + dx * Math.sin(a) + dy * Math.cos(a)];

function retoneTag(tag, tone) { // e.g. FDD fault (amber) → resolved (cyan)
  litFeatures.forEach((f) => { if (f.properties.tag === tag) f.properties.tone = tone; });
  map.getSource("lit-bld")?.setData({ type: "FeatureCollection", features: litFeatures });

// buffer a footprint ring N meters outward along its edge normals: a shell
// must clear the base facade by whole meters on EVERY wall (centroid scaling
// fails on long slabs and concave footprints) or its side faces lose the
// depth test to the base building and only the roof reads as lit
function bufferPoly(poly, meters) {
  const PAD = meters / 110574; // Singapore ≈ equator, lng ≈ lat
  return poly.map((ring) => {
    const pts = ring.slice(0, -1); // drop the closing duplicate
    const n = pts.length;
    if (n < 3) return ring;
    let area = 0;
    for (let i = 0; i < n; i++) {
      const [x1, y1] = pts[i], [x2, y2] = pts[(i + 1) % n];
      area += x1 * y2 - x2 * y1;
    }
    const sgn = area > 0 ? 1 : -1; // outward normal flips with winding
    const out = pts.map((p, i) => {
      const prev = pts[(i - 1 + n) % n], next = pts[(i + 1) % n];
      const norm = (a, b) => {
        const dx = b[0] - a[0], dy = b[1] - a[1], l = Math.hypot(dx, dy) || 1;
        return [sgn * dy / l, -sgn * dx / l];
      };
      const [ax, ay] = norm(prev, p), [bx, by] = norm(p, next);
      let mx = ax + bx, my = ay + by;
      const ml = Math.hypot(mx, my);
      if (ml < 0.35) { mx = ax; my = ay; } // near-reversal: fall back to one edge
      else { mx /= ml; my /= ml; }
      const scale = Math.min(2.5, 2 / Math.max(0.8, ml)); // miter, clamped
      return [p[0] + mx * PAD * scale, p[1] + my * PAD * scale];
    });
    out.push(out[0]);
    return out;
  });
}
function lightBuildingsAt(lngLat, tone, radiusPx = 110, maxMeters = 150, tag = "") {
  try {
    const p = map.project(lngLat);
    const feats = map.queryRenderedFeatures(
      [[p.x - radiusPx, p.y - radiusPx], [p.x + radiusPx, p.y + radiusPx]], { layers: ["bld-3d"] });
    const degLat = maxMeters / 110574;
    const degLng = maxMeters / 111320;
    const near = (ring) => ring.some(([x, y]) =>
      Math.abs(x - lngLat[0]) < degLng && Math.abs(y - lngLat[1]) < degLat);
    const inflate = (poly) => bufferPoly(poly, 10);
    // flatten to individual footprints, one candidate per polygon per slice
    // (tiles merge many footprints into one (Multi)Polygon, and tall towers
    // arrive as stacked min_height → height bands sharing one footprint)
    const cands = [];
    feats.forEach((f) => {
      const polys = f.geometry.type === "Polygon" ? [f.geometry.coordinates]
        : f.geometry.type === "MultiPolygon" ? f.geometry.coordinates : [];
      const pr = f.properties || {};
      const b0 = pr.render_min_height ?? pr.min_height ?? 0;
      const h0 = pr.render_height ?? pr.height ?? 8;
      const bid = pr.building_id; // OSM parts of one building share this
      polys.forEach((poly) => cands.push({ poly, b0, h0, bid }));
    });
    // pass 1: seed with footprints near the site point
    const kept = cands.map((c) => near(c.poly[0]));
    const bids = new Set();
    cands.forEach((c, i) => { if (kept[i] && c.bid != null) bids.add(c.bid); });
    // pass 2: adopt slices standing on or against anything already lit — a
    // complex is podium + towers + crowns in separate features, and no part
    // of it may stay dark above a glowing base
    const CELL = 30 / 110574; // ~30 m adjacency
    const cellKey = (x, y) => `${Math.round(x / CELL)},${Math.round(y / CELL)}`;
    const grid = new Set();
    const boxes = []; // bounding boxes of everything lit, padded ~5 m
    const PADB = 5 / 110574;
    const addKept = (poly) => {
      let x0 = 1e9, y0 = 1e9, x1 = -1e9, y1 = -1e9;
      poly[0].forEach(([x, y]) => {
        grid.add(cellKey(x, y));
        x0 = Math.min(x0, x); y0 = Math.min(y0, y);
        x1 = Math.max(x1, x); y1 = Math.max(y1, y);
      });
      boxes.push([x0 - PADB, y0 - PADB, x1 + PADB, y1 + PADB]);
    };
    cands.forEach((c, i) => { if (kept[i]) addKept(c.poly); });
    const inBoxes = ([x, y]) =>
      boxes.some(([x0, y0, x1, y1]) => x > x0 && x < x1 && y > y0 && y < y1);
    const overlapsLit = (ring) => { // stacked parts: footprint sits on a lit one
      let cx = 0, cy = 0;
      ring.forEach(([x, y]) => { cx += x; cy += y; });
      if (inBoxes([cx / ring.length, cy / ring.length])) return true;
      return ring.some(inBoxes);
    };
    // adoption is overlap/building-id ONLY — same-complex parts (crowns,
    // stacked slices, towers on their own podium) chain in, but street
    // neighbours do NOT: a shophouse district must not flood into one blob
    for (let pass = 0, changed = true; changed && pass < 4; pass++) {
      changed = false;
      cands.forEach((c, i) => {
        if (!kept[i] && ((c.bid != null && bids.has(c.bid)) || overlapsLit(c.poly[0]))) {
          kept[i] = true; addKept(c.poly); changed = true;
          if (c.bid != null) bids.add(c.bid);
        }
      });
    }
    cands.forEach((c, i) => {
      if (!kept[i]) return;
      // the slice band is part of the dedup key, or every band above the
      // first would be dropped and the tower would light up with gaps
      const key = `${JSON.stringify(c.poly[0][0])}|${tone}|${c.b0}|${c.h0}`;
      if (litSeen.has(key)) return;
      litSeen.add(key);
      litFeatures.push({ type: "Feature", properties: {
          tone, tag,
          h: Math.min(320, c.h0) + 3,
          b: c.b0,
        }, geometry: { type: "MultiPolygon", coordinates: [inflate(c.poly)] } });
    });
    map.getSource("lit-bld")?.setData({ type: "FeatureCollection", features: litFeatures });
  } catch (e) { /* DOM bloom still carries the moment */ }
}
function unlightBuildings() {
  litFeatures = []; litSeen = new Set();
  map.getSource("lit-bld")?.setData({ type: "FeatureCollection", features: [] });
}

/* --- x-ray hero tower: glowing floor plates inside a translucent glass shell --- */
let xrayPlates = [], xrayGlass = [], xrayShown = -1;
function xrayBuildingAt(lngLat, radiusPx = 42, maxMeters = 70) {
  try {
    const p = map.project(lngLat);
    const feats = map.queryRenderedFeatures(
      [[p.x - radiusPx, p.y - radiusPx], [p.x + radiusPx, p.y + radiusPx]], { layers: ["bld-3d"] });
    const degLat = maxMeters / 110574, degLng = maxMeters / 111320;
    const near = (ring) => ring.some(([x, y]) =>
      Math.abs(x - lngLat[0]) < degLng && Math.abs(y - lngLat[1]) < degLat);
    // one entry per footprint (keyed on first vertex), keeping its full height
    // across the stacked min_height → height slices
    const tops = new Map();
    feats.forEach((f) => {
      const polys = f.geometry.type === "Polygon" ? [f.geometry.coordinates]
        : f.geometry.type === "MultiPolygon" ? f.geometry.coordinates : [];
      const pr = f.properties || {};
      const h0 = pr.render_height ?? pr.height ?? 8;
      polys.forEach((poly) => {
        if (!near(poly[0])) return;
        const key = JSON.stringify(poly[0][0]);
        const cur = tops.get(key);
        if (!cur || h0 > cur.h) tops.set(key, { poly, h: h0 });
      });
    });
    xrayPlates = []; xrayGlass = [];
    tops.forEach(({ poly, h }) => {
      const H = Math.min(320, h);
      if (H < 20) return; // x-ray the towers, skip street furniture
      const plate = bufferPoly(poly, 4);   // floors: outside the facade…
      const glass = bufferPoly(poly, 13);  // …inside the glass
      const FLOOR = 7; // one glowing deck every ~2 storeys reads best from afar
      for (let z = 0; z + 2 < H; z += FLOOR)
        xrayPlates.push({ type: "Feature", properties: { kind: "plate", b: z, h: z + 1.6 },
          geometry: { type: "MultiPolygon", coordinates: [plate] } });
      xrayGlass.push({ type: "Feature", properties: { kind: "glass", b: 0, h: H + 5 },
        geometry: { type: "MultiPolygon", coordinates: [glass] } });
    });
    xrayPlates.sort((a, b) => a.properties.b - b.properties.b);
    xrayShown = -1;
    setXrayProgress(0);
  } catch (e) { /* skyline still carries the shot */ }
}
function setXrayProgress(p) { // 0..1 — glass wraps on, floors sweep bottom-up
  const n = Math.round(clamp(p, 0, 1) * xrayPlates.length);
  if (n === xrayShown) return;
  xrayShown = n;
  map.getSource("xray")?.setData({ type: "FeatureCollection",
    features: xrayGlass.concat(xrayPlates.slice(0, n)) });
}
function clearXray() {
  xrayPlates = []; xrayGlass = []; xrayShown = -1;
  map.getSource("xray")?.setData({ type: "FeatureCollection", features: [] });
}

/* --- arcs progressive reveal + flowing dash --- */
let arcProgress = ARCS.map(() => 0);
function setArcData() {
  const features = [];
  ARCS.forEach((coords, i) => {
    const p = arcProgress[i];
    if (p <= 0) return;
    const n = Math.max(2, Math.round(p * coords.length));
    features.push({ type: "Feature", properties: {},
      geometry: { type: "LineString", coordinates: coords.slice(0, n) } });
  });
  map.getSource("arcs")?.setData({ type: "FeatureCollection", features });
}
// white-hot pulses racing along every arc: a narrow gradient window sweeps
// line-progress from end to end each cycle
function tickComet(now) {
  const t = ((now % 1600) / 1600) * 1.24 - 0.12; // overshoot so pulses clear both ends
  const st = (v) => clamp(v, 0.0001, 0.9996);
  let s0 = st(t - 0.11), s1 = st(t - 0.035), s2 = st(t), s3 = st(t + 0.02);
  s1 = Math.max(s1, s0 + 1e-4); s2 = Math.max(s2, s1 + 1e-4); s3 = Math.max(s3, s2 + 1e-4);
  map.setPaintProperty("arc-comet", "line-gradient",
    ["interpolate", ["linear"], ["line-progress"],
      s0, "rgba(120,255,244,0)", s1, "rgba(170,255,249,.9)",
      s2, "#ffffff", s3, "rgba(120,255,244,0)"]);
}
// island-scale shockwave: three concentric rings blast out of the CBD as the
// ignition wave departs
function spawnWave(coords) {
  if (!popsEnabled) return;
  for (let i = 0; i < 3; i++) setTimeout(() => {
    const p = map.project(coords);
    const el = document.createElement("div");
    el.style.cssText = `position:absolute;left:${p.x}px;top:${p.y}px;width:260px;height:260px;
      margin:-130px 0 0 -130px;border-radius:50%;pointer-events:none;z-index:9;
      border:3px solid rgba(125,255,242,.9);
      box-shadow:0 0 46px #45ffef,inset 0 0 34px rgba(69,255,239,.4);`;
    document.body.appendChild(el);
    el.animate([
      { transform: "scale(.08)", opacity: 0.95 },
      { transform: "scale(7)", opacity: 0 },
    ], { duration: 2600, easing: "cubic-bezier(.16,1,.3,1)" }).onfinish = () => el.remove();
  }, i * 420);
}

let sitesOn = 0;
const litSites = new Set();
const setSiteOn = (i, on) => map.setFeatureState({ source: "sites", id: i }, { on });

const FDD_SITE = MOCK_SITES.find((m) => m.org === "Tampines Regional Centre");

const igniteSite = (id) => {
  if (litSites.has(id)) return;

const $replay = $("#replay");

let capToken = 0;
function caption(html) {
  const token = ++capToken;
  $cap.classList.remove("in");
  setTimeout(() => {
    if (token !== capToken) return;
    $cap.innerHTML = html;
    $cap.classList.add("in");
  }, 350);
}
function captionOut() { capToken++; $cap.classList.remove("in"); }

  if (!text) { $loc.classList.remove("in"); return; }
  $loc.textContent = text; $loc.classList.add("in");
}

  { name: "intro", dur: 6000,

    },

  { name: "tower", dur: 17000, // EE — the story opens on ONE tower (DBS, Marina Bay)
    enter() {

        map.easeTo({ bearing: -12, duration: dur(9800), easing: (t) => t }); // 4° drift, nothing more
      }
      if (ms > 9600 && !this._c2) { this._c2 = true; caption(CAPS.em2); }
      if (ms > 13600) { captionOut(); loctag(""); }
      pinBloom($("#bloom-cbd"), CBD);
    },
    exit() { this._c1 = this._c2 = false;
      captionOut(); loctag(""); hidePanels();
      $("#bloom-cbd").classList.remove("on"); } },

  { name: "island", dur: 17000,
    enter() {
      map.stop();
      unlightBuildings();
      map.flyTo({ center: [103.8520, 1.3180], zoom: 10.9, pitch: 54, bearing: -8,
        duration: dur(4200), curve: 1.35, easing: easeInOutCubic });
      caption("");
      this._c1 = false; this._orbit = false; this._wave = false;
      this._fault = this._fixed = false;
      arcProgress = ARCS.map(() => 0);
      map.setPaintProperty("arc-comet", "line-opacity", 0);
      this._flow = false;
    },
    update(ms, now) {
      // point → plane: rings radiate out of DBS — each ring of assets ignites
      // TOGETHER, then the next ring out, wave after wave
      if (ms > 2800 && !this._wave) { this._wave = true; spawnWave(DBS_TOWER); }
      ALL_SITES.forEach((s) => {
        const d = Math.hypot(s.coords[0] - DBS_TOWER[0], s.coords[1] - DBS_TOWER[1]);
        const ring = Math.min(5, Math.floor(d / 0.038));
        if (ms > 3000 + ring * 950) igniteSite(s.id);
      });
      if (ms > 4400 && !this._c1) { this._c1 = true; caption(CAPS.ioc1);
        loctag("IoC · Integration of Control"); showPanels("ioc"); }
      if (ms > 5400 && !this._orbit) {
        this._orbit = true;
        map.easeTo({ bearing: -2, duration: dur(9200), easing: (t) => t });
      }
      // FDD moment: a fault flares amber at Tampines, is diagnosed, resolves
      if (ms > 10400 && !this._fault) { this._fault = true;
        setFault(FDD_SITE.id, true); caption(CAPS.ioc2); }
      if (ms > 14400 && !this._fixed) { this._fixed = true;
        setFault(FDD_SITE.id, false); caption(CAPS.fabric); }
      // arcs shoot from Changi to every asset
      let changed = false;
      ARCS.forEach((_, i) => {
        const p = clamp((ms - 7600 - i * 120) / 700, 0, 1);
        const e = easeOut(p);
        if (e !== arcProgress[i]) { arcProgress[i] = e; changed = true; }
      });
      if (changed) setArcData();
      if (!this._flow && arcProgress.every((p) => p >= 1)) {
        this._flow = true;
        map.setPaintProperty("arc-comet", "line-opacity", 1);
      }
      if (this._flow) tickComet(now);
    },
    exit() {
      allSitesOn();
      setFault(FDD_SITE.id, false);
      arcProgress = ARCS.map(() => 1); setArcData();
      map.setPaintProperty("arc-comet", "line-opacity", 1);
      captionOut(); loctag(""); hidePanels();
    } },

  { name: "finale", dur: Infinity,
    enter() {
      map.stop();
      // steady ending: a barely-perceptible pendulum, never a big swing
      map.easeTo({ center: [103.8520, 1.3180], zoom: 10.9, pitch: 54, bearing: 2,
        duration: dur(26000), easing: (t) => t });
      this._timers = [setTimeout(() => $replay.classList.add("in"), 2400)];
      this._swung = false;
    },
    update(ms, now) {
      tickComet(now);
      if (ms > 26500 && !this._swung) { // keep the world slowly turning forever
        this._swung = true;
        map.easeTo({ bearing: -8, duration: dur(30000), easing: (t) => t });
      }
      if (ms > 57000) this._swung = false;
    },
    exit() {
      (this._timers || []).forEach(clearTimeout);
      $replay.classList.remove("in");
    } },
];
PHASES.reduce((acc, ph) => { ph.start = acc; return acc + ph.dur; }, 0);

/* =============================== ENGINE =============================== */
let playT = 0, cur = -1, last = performance.now();

function resetWorld() {
  map.stop();
  unlightBuildings();
  clearXray();
  allSitesOff();
  arcProgress = ARCS.map(() => 0); setArcData();
  if (map.getLayer("arc-comet")) map.setPaintProperty("arc-comet", "line-opacity", 0);
  ["#bloom-changi", "#bloom-cbd"].forEach((s) => $(s).classList.remove("on"));
  setFault(FDD_SITE.id, false);
  captionOut(); loctag(""); hidePanels();
}
function jumpTo(idx) {
  idx = clamp(idx, 0, PHASES.length - 1);
  popsEnabled = false; // no shockwave spam when rebuilding pre-state
  if (cur >= 0) PHASES[cur].exit();
  resetWorld();
  // world state each phase expects on entry (for skips/replay)
  if (idx >= 2) igniteSite(1); // the DBS origin tower
  if (idx >= 3) ["dbs","ocbc","ngs","frasers","with"].forEach((k) =>
    igniteSite(SITES.find((s) => s.key === k).id));
  if (idx >= 4) { allSitesOn(); arcProgress = ARCS.map(() => 1); setArcData();
    map.setPaintProperty("arc-comet", "line-opacity", 1); }
  playT = PHASES[idx].start;
  cur = idx;
  PHASES[idx].enter();
  popsEnabled = true;
}
$replay.onclick = () => jumpTo(0);
$("#skip").onclick = () => { if (exploring) resumeTour(); jumpTo(cur + 1); };

/* --- explore mode: grab the map and the tour pauses; assets are clickable --- */
let exploring = false;
function enterExplore() {
  if (exploring) return;
  exploring = true;
  map.stop(); // stop the scripted camera so it doesn't fight the user's hand
  captionOut(); loctag("");
  $replay.classList.remove("in");
  $("#resume").classList.add("in");
}
function resumeTour() {
  if (!exploring) return;
  exploring = false;
  $("#resume").classList.remove("in");
  $("#sitecard").classList.remove("in");
  jumpTo(cur); // rebuild the phase from a clean, correct world state
}
$("#resume").onclick = resumeTour;

function wireExplore() {
  ["mousedown", "wheel", "touchstart"].forEach((ev) =>
    map.getCanvas().addEventListener(ev, enterExplore, { passive: true }));
  const openSite = (id) => {
    const s = ALL_SITES[id];
    if (!s) return;
    enterExplore();
    igniteSite(id);
    $("#sitecard").innerHTML = `<h4>${s.org}</h4>
      <div class="sc-sub">${s.tier === "hero" ? "client asset · online" : "portfolio asset · online"}</div>
      <div class="sc-live"><b>LIVE</b> — energy, assets, people, space, environment
        streaming into the AIP ontology.</div>`;
    $("#sitecard").classList.add("in");
    map.flyTo({ center: s.coords, zoom: 15.4, pitch: 60, bearing: -20,
      duration: 2600, curve: 1.4, easing: easeInOutCubic });
    map.once("moveend", () => {
      if (exploring) lightBuildingsAt(s.coords, "cyan", 70, 100);
    });
  };
  ["site-core", "site-label", "syn-bld-3d"].forEach((layer) => {
    map.on("click", layer, (e) => {
      const f = e.features && e.features[0];
      if (!f) return;
      openSite(f.properties.site ?? f.id);
    });
    map.on("mouseenter", layer, () => { map.getCanvas().style.cursor = "pointer"; });
    map.on("mouseleave", layer, () => { map.getCanvas().style.cursor = ""; });
  });

  // ANY real building is inspectable: click one and its live telemetry card
  // opens — the whole map is the digital twin, not just the 35 story assets
  map.on("click", "bld-3d", (e) => {
    const markers = ["site-core", "site-label", "syn-bld-3d"].filter((l) => map.getLayer(l));
    if (map.queryRenderedFeatures(e.point, { layers: markers }).length) return; // asset handler wins
    const f = e.features && e.features[0];
    if (!f) return;
    enterExplore();
    lightBuildingsAt([e.lngLat.lng, e.lngLat.lat], "cyan", 8, 22);
    showBuildingCard(f, e.lngLat);
  });
  map.on("mouseenter", "bld-3d", () => { map.getCanvas().style.cursor = "pointer"; });
  map.on("mouseleave", "bld-3d", () => { map.getCanvas().style.cursor = ""; });
  // clicking empty ground puts the card away
  map.on("click", (e) => {
    const layers = ["bld-3d", "site-core", "site-label", "syn-bld-3d"].filter((l) => map.getLayer(l));
    if (!map.queryRenderedFeatures(e.point, { layers }).length)
      $("#sitecard").classList.remove("in");
  });
}

// deterministic mock telemetry seeded by location: the same building always
// reports the same numbers, so a demo walkthrough feels like a stable system
function showBuildingCard(f, ll) {
  const pr = f.properties || {};
  const h = Math.round(pr.render_height ?? pr.height ?? 12);
  const floors = Math.max(1, Math.round(h / 3.6));
  const rawType = pr.type && pr.type !== "building" && pr.type !== "building:part"
    ? pr.type.replace(/_/g, " ") : "commercial";
  const type = rawType[0].toUpperCase() + rawType.slice(1);
  const seed = Math.abs(Math.sin(ll.lng * 991.7 + ll.lat * 773.3)) * 1000;
  const s = (n) => { const x = Math.sin(seed + n * 17.17) * 43758.5453; return x - Math.floor(x); };
  const rt = Math.round(90 + h * 2.1 + s(1) * 320);
  const eff = (0.58 + s(2) * 0.24).toFixed(2);
  const mwh = (rt * 0.019 + s(3) * 3.2 + 1.2).toFixed(1);
  const occ = Math.round(48 + s(4) * 45);
  const mins = 2 + Math.round(s(5) * 7);
  $("#sitecard").innerHTML = `<h4>${type} · ${h} m · ${floors}F</h4>
    <div class="sc-sub">asset online · EE optimizing · setpoints updated ${mins} min ago</div>
    <div class="m-grid">
      <span class="k">Cooling load</span><span class="v">${rt} RT</span>
      <span class="k">Plant efficiency</span><span class="v">${eff} kW/RT</span>
      <span class="k">Energy today</span><span class="v">${mwh} MWh</span>
      <span class="k">Occupancy</span><span class="v">${occ}%</span>
      <span class="k">FDD</span><span class="v">no open faults</span>
    </div>
    <div class="sc-note">demo telemetry · one ontology · AIP</div>`;
  $("#sitecard").classList.add("in");
}

function frame(now) {
  requestAnimationFrame(frame);
  const dt = clamp(now - last, 0, 100); // first RAF timestamp can precede `last`
  last = now;
  if (!exploring) {
    playT = Math.max(0, playT + dt);
    let idx = 0;
    for (let i = PHASES.length - 1; i >= 0; i--) if (playT >= PHASES[i].start) { idx = i; break; }
    if (idx !== cur) { if (cur >= 0) PHASES[cur].exit(); cur = idx; PHASES[cur].enter(); }
    const ph = PHASES[cur];
    ph.update(playT - ph.start, now);
  } else if (arcProgress.some((p) => p > 0)) {
    tickComet(now); // the world stays alive under the user's hand
  }

  // pulsing rings on lit sites
  if (map.getLayer("site-pulse") && sitesOn > 0) {
    const phse = (now % 1400) / 1400;
    const on = ["boolean", ["feature-state", "on"], false];
    map.setPaintProperty("site-pulse", "circle-radius", ["case", on, 9 + phse * 26, 0]);
    map.setPaintProperty("site-pulse", "circle-opacity", ["case", on, 0.75 * (1 - phse), 0]);
  }
  window.__dbg = { playT: Math.round(playT), cur, phase: PHASES[cur].name, dt: Math.round(dt), exploring };
}

map.on("load", () => {
  setupLayers();
  wireExplore();
  jumpTo(0);
  requestAnimationFrame(frame);
});
</script>
</body>
