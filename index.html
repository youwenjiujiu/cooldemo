<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Island Grid — Singapore Energy Intelligence</title>
<style>
:root {
  --cyan: #38e1d6; --amber: #ffb84d; --violet: #8c9aff;
  --text: #eaf6f8; --muted: #7e93a3;
}
html, body { margin: 0; height: 100%; background: #020409; overflow: hidden;
  font-family: "Space Grotesk", "Avenir Next", -apple-system, "Segoe UI", system-ui, sans-serif;
  color: var(--text); }
canvas { display: block; }
#vignette { position: absolute; inset: 0; pointer-events: none; z-index: 3;
  box-shadow: inset 0 0 340px 100px rgba(0,0,0,.9); }

/* title */
#title { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center;
  justify-content: center; text-align: center; z-index: 10; pointer-events: none;
  opacity: 0; transition: opacity 1.2s ease; }
#title.in { opacity: 1; }
#title.out { opacity: 0; filter: blur(6px); transition: opacity 1.2s ease, filter 1.2s ease; }
#title .eyebrow { font-size: 12px; letter-spacing: .3em; color: var(--muted); text-transform: uppercase; }
#title h1 { font-size: clamp(44px, 7.5vw, 96px); font-weight: 700; margin: 16px 0 8px;
  letter-spacing: .12em; color: #fff; text-shadow: 0 0 46px rgba(56,225,214,.5); }
#title .sub { font-size: clamp(13px, 1.5vw, 18px); color: var(--muted); letter-spacing: .08em; }
#title .sub b { color: var(--cyan); font-weight: 600; }

/* cinematic captions */
#caption { position: absolute; left: 50%; bottom: 11%; transform: translateX(-50%);
  max-width: 860px; width: 90vw; text-align: center; z-index: 10; pointer-events: none; }
#caption .line { font-size: clamp(17px, 2.1vw, 26px); font-weight: 500; letter-spacing: .06em;
  line-height: 1.5; color: var(--text); opacity: 0; transform: translateY(14px);
  transition: opacity .9s ease, transform .9s cubic-bezier(.16,1,.3,1);
  text-shadow: 0 2px 24px rgba(0,0,0,.9), 0 0 40px rgba(56,225,214,.18); }
#caption .line.in { opacity: 1; transform: translateY(0); }
#caption .line em { font-style: normal; color: var(--cyan); }
#caption .line b { font-weight: 600; color: var(--amber); }

/* finale */
#finale { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center;
  justify-content: center; text-align: center; z-index: 10; pointer-events: none;
  opacity: 0; transition: opacity 1.4s ease; }
#finale.in { opacity: 1; }
#finale h2 { font-size: clamp(28px, 4vw, 54px); font-weight: 700; margin: 0 0 14px; color: #fff;
  letter-spacing: .02em; text-shadow: 0 0 50px rgba(56,225,214,.4); }
#finale .tag { color: var(--muted); font-size: clamp(13px, 1.5vw, 17px); letter-spacing: .1em;
  margin-bottom: 42px; }
#clients { display: flex; flex-wrap: wrap; justify-content: center; gap: 14px 34px; max-width: 900px; }
#clients span { font-size: 15px; letter-spacing: .18em; text-transform: uppercase; color: var(--text);
  opacity: 0; transform: translateY(10px); transition: opacity .6s ease, transform .6s ease;
  display: flex; align-items: center; gap: 10px; }
#clients span::before { content: ""; width: 5px; height: 5px; border-radius: 50%;
  background: var(--cyan); box-shadow: 0 0 8px var(--cyan); }
#clients span.in { opacity: .95; transform: translateY(0); }

/* controls */
#replay { position: absolute; bottom: 34px; left: 50%; transform: translateX(-50%);
  background: rgba(56,225,214,.08); color: var(--cyan); border: 1px solid rgba(56,225,214,.45);
  border-radius: 26px; padding: 11px 34px; font-size: 13px; letter-spacing: .2em; cursor: pointer;
  font-family: inherit; text-transform: uppercase; z-index: 20; opacity: 0; pointer-events: none;
  transition: opacity 1s ease, background .3s; }
#replay.in { opacity: 1; pointer-events: auto; }
#replay:hover { background: rgba(56,225,214,.2); }
#skip { position: absolute; bottom: 20px; right: 24px; background: none; border: none;
  color: var(--muted); font-family: inherit; font-size: 11px; letter-spacing: .18em;
  text-transform: uppercase; cursor: pointer; z-index: 20; opacity: .55; }
#skip:hover { opacity: 1; color: var(--cyan); }
</style>
</head>
<body>
<div id="vignette"></div>

<div id="title">
  <div class="eyebrow">Singapore · New Energy Intelligence</div>
  <h1>ISLAND GRID</h1>
  <div class="sub"><b>HVAC · Solar · Wind · Storage</b> — sensed, understood, optimized</div>
</div>

<div id="caption"><div class="line" id="cap-line"></div></div>

<div id="finale">
  <h2>One island. One optimized energy fabric.</h2>
  <div class="tag">AI-DRIVEN ENERGY INTELLIGENCE FOR SINGAPORE'S MOST CRITICAL INFRASTRUCTURE</div>
  <div id="clients"></div>
</div>

<button id="replay">Replay</button>
<button id="skip">Skip ▸▸</button>

<script src="coast.js"></script>
<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
} }
</script>
<script type="module">
import * as THREE from "three";
import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";
import { OutputPass } from "three/addons/postprocessing/OutputPass.js";

/* ================= DATA ================= */
const SITES = [
  { key: "changi",  org: "Changi Airport", coords: [103.9865, 1.3644], h: 30 },
  { key: "dbs",     org: "DBS",            coords: [103.8540, 1.2790], h: 24 },
  { key: "ocbc",    org: "OCBC",           coords: [103.8492, 1.2846], h: 22 },
  { key: "ngs",     org: "NGS",            coords: [103.8513, 1.2903], h: 14 },
  { key: "frasers", org: "Frasers",        coords: [103.8465, 1.2770], h: 21 },
  { key: "with",    org: "WITH",           coords: [103.8450, 1.2815], h: 17 },
  { key: "psa",     org: "PSA",            coords: [103.8030, 1.2740], h: 18 },
  { key: "mse",     org: "MSE",            coords: [103.8320, 1.3110], h: 15 },
  { key: "hdb",     org: "HDB",            coords: [103.8490, 1.3330], h: 19 },
  { key: "stengg",  org: "ST Engineering", coords: [103.8510, 1.3790], h: 16 },
  { key: "htx",     org: "HTX",            coords: [103.7880, 1.3070], h: 15 },
];
const CX = 103.82, CZ = 1.34, SC = 400;
const P = ([lng, lat]) => [(lng - CX) * SC, -(lat - CZ) * SC];
const CBD = P([103.851, 1.283]);
const CHANGI = P(SITES[0].coords);

/* ================= HELPERS ================= */
const clamp = (v, a, b) => Math.min(b, Math.max(a, v));
const lerp = (a, b, p) => a + (b - a) * p;
const smooth = (p) => p * p * (3 - 2 * p);
const easeOut = (p) => 1 - Math.pow(1 - p, 3);
function prng(seed) { // mulberry32
  return () => {
    seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
    let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
const ring = COAST[0].map(P);
function inIsland(x, z) {
  let inside = false;
  for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
    const [xi, zi] = ring[i], [xj, zj] = ring[j];
    if ((zi > z) !== (zj > z) && x < ((xj - xi) * (z - zi)) / (zj - zi) + xi) inside = !inside;
  }
  return inside;
}

/* ================= SCENE ================= */
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.prepend(renderer.domElement);
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x020409, 0.0016);
const camera = new THREE.PerspectiveCamera(52, innerWidth / innerHeight, 1, 3000);

const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.85, 0.5, 0.5);
composer.addPass(bloom);
composer.addPass(new OutputPass());

addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});

/* --- starfield --- */
{
  const r = prng(7);
  const pos = new Float32Array(1400 * 3);
  for (let i = 0; i < 1400; i++) {
    const th = r() * Math.PI * 2, ph = Math.acos(2 * r() - 1);
    const R = 900 + r() * 600;
    pos[i*3] = R * Math.sin(ph) * Math.cos(th);
    pos[i*3+1] = Math.abs(R * Math.cos(ph)) * 0.6 + 40;
    pos[i*3+2] = R * Math.sin(ph) * Math.sin(th);
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute("position", new THREE.BufferAttribute(pos, 3));
  scene.add(new THREE.Points(g, new THREE.PointsMaterial({
    color: 0x3a5570, size: 1.4, sizeAttenuation: true, transparent: true, opacity: 0.8 })));
}

/* --- sea grid floor --- */
const grid = new THREE.GridHelper(1600, 90, 0x0d2233, 0x081420);
grid.position.y = -0.4;
grid.material.transparent = true;
grid.material.opacity = 0;
scene.add(grid);

/* --- radial glow under island --- */
{
  const cv = document.createElement("canvas"); cv.width = cv.height = 256;
  const c = cv.getContext("2d");
  const g = c.createRadialGradient(128, 128, 10, 128, 128, 128);
  g.addColorStop(0, "rgba(24,80,90,.5)"); g.addColorStop(1, "rgba(24,80,90,0)");
  c.fillStyle = g; c.fillRect(0, 0, 256, 256);
  const glow = new THREE.Mesh(
    new THREE.PlaneGeometry(420, 300),
    new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(cv), transparent: true,
      depthWrite: false, opacity: 0.9 }));
  glow.rotation.x = -Math.PI / 2; glow.position.set(-8, -0.3, -4);
  scene.add(glow);
}

/* --- neon coastline (draw-on) --- */
const coastPts = ring.map(([x, z]) => new THREE.Vector3(x, 0.3, z));
coastPts.push(coastPts[0].clone());
const coastGeo = new THREE.BufferGeometry().setFromPoints(coastPts);
const coastLine = new THREE.Line(coastGeo,
  new THREE.LineBasicMaterial({ color: 0x2ee8dc, transparent: true, opacity: 0.95 }));
coastGeo.setDrawRange(0, 0);
scene.add(coastLine);
// soft double stroke for glow body
const coastLine2 = new THREE.Line(coastGeo.clone(),
  new THREE.LineBasicMaterial({ color: 0x1a6f76, transparent: true, opacity: 0.5 }));
coastLine2.position.y = -0.12; coastLine2.geometry.setDrawRange(0, 0);
scene.add(coastLine2);

/* --- city blocks (instanced) --- */
const CITY_N = 720;
const cityDelays = new Float32Array(CITY_N);
const cityHeights = new Float32Array(CITY_N);
const cityPos = [];
{
  const r = prng(42);
  let placed = 0, guard = 0;
  while (placed < CITY_N && guard++ < 40000) {
    const x = lerp(-92, 90, r()), z = lerp(-52, 46, r());
    if (!inIsland(x, z)) continue;
    const dCbd = Math.hypot(x - CBD[0], z - CBD[1]);
    const hub = Math.exp(-dCbd / 26);
    const h = 1.2 + r() * 3.5 + hub * (5 + r() * 17);
    cityPos.push([x, z]); cityHeights[placed] = h;
    cityDelays[placed] = r() * 0.75 + hub * 0.15;
    placed++;
  }
}
const cityMesh = new THREE.InstancedMesh(
  new THREE.BoxGeometry(1.6, 1, 1.6),
  new THREE.MeshBasicMaterial({ color: 0x123043, transparent: true, opacity: 0.92 }),
  cityPos.length);
const dummy = new THREE.Object3D();
function setCityGrowth(p) { // p 0..1 global rise progress
  for (let i = 0; i < cityPos.length; i++) {
    const lp = clamp((p - cityDelays[i]) / 0.25, 0, 1);
    const h = Math.max(0.001, cityHeights[i] * easeOut(lp));
    dummy.position.set(cityPos[i][0], h / 2, cityPos[i][1]);
    dummy.scale.set(1, h, 1);
    dummy.updateMatrix();
    cityMesh.setMatrixAt(i, dummy.matrix);
  }
  cityMesh.instanceMatrix.needsUpdate = true;
}
setCityGrowth(0);
scene.add(cityMesh);

/* --- asset towers + labels + rings + beams --- */
function labelSprite(text, color) {
  const cv = document.createElement("canvas");
  const c = cv.getContext("2d");
  c.font = "600 44px 'Space Grotesk', 'Avenir Next', sans-serif";
  const w = Math.ceil(c.measureText(text).width) + 46;
  cv.width = w; cv.height = 78;
  const c2 = cv.getContext("2d");
  c2.font = "600 44px 'Space Grotesk', 'Avenir Next', sans-serif";
  c2.textAlign = "center"; c2.textBaseline = "middle";
  c2.shadowColor = color; c2.shadowBlur = 8;
  c2.fillStyle = "#c9e2e2";
  c2.fillText(text, w / 2, 40);
  const tex = new THREE.CanvasTexture(cv);
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true,
    opacity: 0, depthWrite: false }));
  sp.scale.set(w / 9, 78 / 9, 1);
  return sp;
}
const assets = SITES.map((s, i) => {
  const [x, z] = P(s.coords);
  const isChangi = i === 0;
  const color = isChangi ? 0xffb84d : 0x2cc9bd;
  const g = new THREE.Group();
  g.position.set(x, 0, z);

  const tower = new THREE.Mesh(
    new THREE.BoxGeometry(2.6, 1, 2.6),
    new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.95 }));
  tower.scale.y = 0.001; tower.position.y = 0;
  g.add(tower);

  const beam = new THREE.Mesh(
    new THREE.CylinderGeometry(0.4, 0.75, 60, 8, 1, true),
    new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0,
      side: THREE.DoubleSide, depthWrite: false }));
  beam.position.y = 30;
  g.add(beam);

  const ringMesh = new THREE.Mesh(
    new THREE.RingGeometry(1, 1.18, 48),
    new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0,
      side: THREE.DoubleSide, depthWrite: false }));
  ringMesh.rotation.x = -Math.PI / 2; ringMesh.position.y = 0.35;
  g.add(ringMesh);

  const label = labelSprite(s.org, isChangi ? "#ffb84d" : "#35f0e0");
  // fan labels of tightly-clustered CBD sites outward so they stay legible
  const dx = x - CBD[0], dz = z - CBD[1], dc = Math.hypot(dx, dz);
  if (dc < 8) {
    const ux = dc > 0.01 ? dx / dc : Math.cos(i * 2.2);
    const uz = dc > 0.01 ? dz / dc : Math.sin(i * 2.2);
    label.position.set(ux * 14, s.h + 6 + (i % 3) * 6, uz * 14);
  } else {
    label.position.y = s.h + 7;
  }
  g.add(label);

  scene.add(g);
  return { ...s, x, z, color, group: g, tower, beam, ring: ringMesh, label,
    lit: 0, litAt: -1 };
});
function igniteAsset(a, now) { if (a.litAt < 0) a.litAt = now; }
let labelFade = 1, labelFadeTarget = 1; // dim asset labels while the network is the hero
function updateAssets(now) {
  labelFade += (labelFadeTarget - labelFade) * 0.04;
  for (const a of assets) {
    if (a.litAt < 0) continue;
    const t = (now - a.litAt) / 1000;
    const rise = easeOut(clamp(t / 1.1, 0, 1));
    a.lit = rise;
    const h = Math.max(0.001, a.h * rise);
    a.tower.scale.y = h; a.tower.position.y = h / 2;
    const pulse = 0.75 + 0.25 * Math.sin(now / 300 + a.x);
    a.tower.material.opacity = 0.4 + 0.3 * pulse * rise;
    a.beam.material.opacity = 0.055 * rise * pulse;
    a.label.material.opacity = clamp((t - 0.7) / 0.8, 0, 1) * 0.95 *
      (a.key === "changi" ? 1 : labelFade);
    const rp = (t % 2.2) / 2.2;
    const rs = 2 + rp * 16;
    a.ring.scale.set(rs, rs, 1);
    a.ring.material.opacity = rise * 0.5 * (1 - rp);
  }
}

/* --- energy arcs + flowing particles --- */
const ARC_SEG = 72;
const arcs = assets.slice(1).map((a, i) => {
  const from = new THREE.Vector3(CHANGI[0], 2, CHANGI[1]);
  const to = new THREE.Vector3(a.x, 2, a.z);
  const mid = from.clone().lerp(to, 0.5);
  const d = from.distanceTo(to);
  mid.y = 10 + d * 0.28;
  const perp = new THREE.Vector3(-(to.z - from.z), 0, to.x - from.x).normalize()
    .multiplyScalar(d * 0.1 * (i % 2 ? 1 : -1));
  mid.add(perp);
  const curve = new THREE.QuadraticBezierCurve3(from, mid, to);
  const pts = curve.getPoints(ARC_SEG);
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  geo.setDrawRange(0, 0);
  const line = new THREE.Line(geo,
    new THREE.LineBasicMaterial({ color: 0x8c9aff, transparent: true, opacity: 0.85 }));
  scene.add(line);

  const N_P = 22;
  const ppos = new Float32Array(N_P * 3);
  const pgeo = new THREE.BufferGeometry();
  pgeo.setAttribute("position", new THREE.BufferAttribute(ppos, 3));
  const points = new THREE.Points(pgeo, new THREE.PointsMaterial({
    color: 0x9ffff8, size: 2.3, transparent: true, opacity: 0, depthWrite: false }));
  scene.add(points);
  return { curve, line, geo, points, ppos, pgeo, reveal: 0, offset: Math.random() };
});
function updateArcs(now, revealP) {
  arcs.forEach((arc, i) => {
    const p = clamp((revealP - i * 0.055) / 0.35, 0, 1);
    arc.reveal = easeOut(p);
    arc.geo.setDrawRange(0, Math.floor(arc.reveal * ARC_SEG) + 1);
    const on = arc.reveal >= 1;
    arc.points.material.opacity = on ? 0.95 : 0;
    if (on) {
      const N = arc.ppos.length / 3;
      for (let k = 0; k < N; k++) {
        const t = ((now / 4200) + arc.offset + k / N) % 1;
        const v = arc.curve.getPoint(t);
        arc.ppos[k*3] = v.x; arc.ppos[k*3+1] = v.y; arc.ppos[k*3+2] = v.z;
      }
      arc.pgeo.attributes.position.needsUpdate = true;
    }
  });
}

/* --- Changi halo: orbiting particles --- */
const halo = (() => {
  const N = 90, r = prng(5);
  const pos = new Float32Array(N * 3), seeds = [];
  for (let i = 0; i < N; i++) seeds.push({ a: r() * Math.PI * 2, R: 6 + r() * 9,
    y: 2 + r() * 26, sp: 0.3 + r() * 0.7 });
  const g = new THREE.BufferGeometry();
  g.setAttribute("position", new THREE.BufferAttribute(pos, 3));
  const pts = new THREE.Points(g, new THREE.PointsMaterial({ color: 0xffd9a0, size: 1.3,
    transparent: true, opacity: 0, depthWrite: false }));
  pts.position.set(CHANGI[0], 0, CHANGI[1]);
  scene.add(pts);
  return { pts, g, pos, seeds };
})();
function updateHalo(now, vis) {
  halo.pts.material.opacity = vis * 0.9;
  if (vis <= 0) return;
  halo.seeds.forEach((s, i) => {
    const a = s.a + now / 1000 * s.sp;
    halo.pos[i*3] = Math.cos(a) * s.R;
    halo.pos[i*3+1] = s.y + Math.sin(now / 700 + i) * 0.8;
    halo.pos[i*3+2] = Math.sin(a) * s.R;
  });
  halo.g.attributes.position.needsUpdate = true;
}

/* ================= CINEMATIC TIMELINE ================= */
/* All narrative is text — no numeric stats anywhere. */
const CAPS = {
  city:    'Every building on this island consumes energy — <em>most of it for cooling</em>.',
  changi1: 'At <b>Changi Airport</b>, our AI retunes the cooling plant <em>in real time</em> —',
  changi2: '— sensing every arriving flight, every surge of passengers, every shift in the weather.',
  assets:  'Banks. Ports. Ministries. Galleries. Housing. <em>One by one, assets come online.</em>',
  fabric:  'Together they form a <em>living energy fabric</em> — optimized continuously, island-wide.',
};

const camFrom = new THREE.Vector3(), camTo = new THREE.Vector3();
const lookFrom = new THREE.Vector3(), lookTo = new THREE.Vector3();
const look = new THREE.Vector3();
function camSeg(fp, tp, fl, tl, p) {
  camFrom.set(...fp); camTo.set(...tp); lookFrom.set(...fl); lookTo.set(...tl);
  camera.position.lerpVectors(camFrom, camTo, smooth(p));
  look.lerpVectors(lookFrom, lookTo, smooth(p));
  camera.lookAt(look);
}

const CHG = [CHANGI[0], 8, CHANGI[1]];
const PHASES = [
  { name: "outline", dur: 7000,
    enter() { $title.classList.add("in"); },
    update(ms, now, p) {
      camSeg([0, 260, 300], [0, 190, 250], [0, 0, 0], [0, 0, 0], p);
      const n = Math.floor(easeOut(clamp(ms / 5200, 0, 1)) * coastPts.length);
      coastGeo.setDrawRange(0, n);
      coastLine2.geometry.setDrawRange(0, n);
      grid.material.opacity = 0.5 * clamp(ms / 2600, 0, 1);
      if (ms > 5800) $title.classList.add("out");
    },
    exit() { $title.classList.remove("in", "out");
      coastGeo.setDrawRange(0, Infinity); coastLine2.geometry.setDrawRange(0, Infinity); } },

  { name: "city", dur: 8000,
    enter() { caption(CAPS.city); },
    update(ms, now, p) {
      camSeg([0, 190, 250], [-30, 120, 185], [0, 0, 0], [0, 0, 0], p);
      setCityGrowth(easeOut(clamp(ms / 6000, 0, 1)));
      if (ms > 6800) captionOut();
    },
    exit() { setCityGrowth(1); captionOut(); } },

  { name: "changi", dur: 13000,
    enter() { igniteAsset(assets[0], performance.now()); },
    update(ms, now, p) {
      camSeg([-30, 120, 185], [CHANGI[0] + 34, 26, CHANGI[1] + 40], [0, 0, 0], CHG, clamp(p * 1.6, 0, 1));
      if (ms > 2600 && !this._c1) { this._c1 = true; caption(CAPS.changi1); }
      if (ms > 7200 && !this._c2) { this._c2 = true; caption(CAPS.changi2); }
      if (ms > 11800) captionOut();
      updateHalo(now, clamp((ms - 1500) / 1500, 0, 1));
    },
    exit() { this._c1 = this._c2 = false; captionOut(); } },

  { name: "assets", dur: 12000,
    enter() { caption(CAPS.assets); },
    update(ms, now, p) {
      camSeg([CHANGI[0] + 34, 26, CHANGI[1] + 40], [40, 150, 205], CHG, [0, 0, 0], clamp(p * 1.35, 0, 1));
      assets.forEach((a, i) => {
        if (i > 0 && ms > 2200 + (i - 1) * 850) igniteAsset(a, now);
      });
      if (ms > 10800) captionOut();
      updateHalo(now, 1);
    },
    exit() { assets.forEach((a) => igniteAsset(a, performance.now() - 3000)); captionOut(); } },

  { name: "fabric", dur: 11000,
    enter() { caption(CAPS.fabric); labelFadeTarget = 0.18; },
    update(ms, now, p) {
      camSeg([40, 150, 205], [-60, 120, 195], [0, 0, 0], [0, 0, 0], p);
      updateArcs(now, clamp(ms / 7000, 0, 1));
      if (ms > 9800) captionOut();
      updateHalo(now, 1);
    },
    exit() { updateArcs(performance.now(), 1); captionOut(); } },

  { name: "finale", dur: Infinity,
    enter() {
      labelFadeTarget = 0.18;
      $finale.classList.add("in");
      this._timers = [];
      document.querySelectorAll("#clients span").forEach((el, i) =>
        this._timers.push(setTimeout(() => el.classList.add("in"), 800 + i * 130)));
      this._timers.push(setTimeout(() => $replay.classList.add("in"), 2800));
    },
    update(ms, now) {
      const a = now / 14000;
      const R = 235, el = 135;
      camera.position.set(Math.sin(a) * R, el, Math.cos(a) * R);
      camera.lookAt(0, 4, 0);
      updateArcs(now, 1);
      updateHalo(now, 1);
    },
    exit() {
      (this._timers || []).forEach(clearTimeout);
      $finale.classList.remove("in");
      $replay.classList.remove("in");
      document.querySelectorAll("#clients span").forEach((el) => el.classList.remove("in"));
    } },
];
PHASES.reduce((acc, ph) => { ph.start = acc; return acc + ph.dur; }, 0);

/* ================= UI ================= */
const $title = document.getElementById("title");
const $finale = document.getElementById("finale");
const $replay = document.getElementById("replay");
const $cap = document.getElementById("cap-line");
document.getElementById("clients").innerHTML =
  SITES.map((s) => `<span>${s.org}</span>`).join("");

let capToken = 0;
function caption(html) {
  const token = ++capToken;
  $cap.classList.remove("in");
  setTimeout(() => {
    if (token !== capToken) return;
    $cap.innerHTML = html;
    $cap.classList.add("in");
  }, 350);
}
function captionOut() { capToken++; $cap.classList.remove("in"); }

/* ================= ENGINE ================= */
let playT = 0, cur = -1, last = performance.now();
function resetWorld() {
  labelFade = labelFadeTarget = 1;
  coastGeo.setDrawRange(0, 0); coastLine2.geometry.setDrawRange(0, 0);
  grid.material.opacity = 0;
  setCityGrowth(0);
  assets.forEach((a) => {
    a.litAt = -1; a.lit = 0;
    a.tower.scale.y = 0.001; a.tower.position.y = 0;
    a.beam.material.opacity = 0; a.label.material.opacity = 0; a.ring.material.opacity = 0;
  });
  arcs.forEach((arc) => { arc.geo.setDrawRange(0, 0); arc.points.material.opacity = 0; });
  updateHalo(performance.now(), 0);
  captionOut();
}
function jumpTo(idx) {
  idx = clamp(idx, 0, PHASES.length - 1);
  if (cur >= 0) PHASES[cur].exit();
  // rebuild world state expected at the start of this phase
  resetWorld();
  if (idx >= 1) { coastGeo.setDrawRange(0, Infinity);
    coastLine2.geometry.setDrawRange(0, Infinity); grid.material.opacity = 0.5; }
  if (idx >= 2) setCityGrowth(1);
  if (idx >= 3) igniteAsset(assets[0], performance.now() - 3000);
  if (idx >= 4) assets.forEach((a) => igniteAsset(a, performance.now() - 3000));
  if (idx >= 5) updateArcs(performance.now(), 1);
  cur = idx;
  playT = PHASES[idx].start;
  PHASES[idx].enter();
}
$replay.onclick = () => jumpTo(0);
document.getElementById("skip").onclick = () => jumpTo(cur + 1);

function frame(now) {
  requestAnimationFrame(frame);
  const dt = clamp(now - last, 0, 100); // first RAF timestamp can precede `last` — never negative
  last = now;
  playT = Math.max(0, playT + dt);
  let idx = 0;
  for (let i = PHASES.length - 1; i >= 0; i--) if (playT >= PHASES[i].start) { idx = i; break; }
  if (idx !== cur) { if (cur >= 0) PHASES[cur].exit(); cur = idx; PHASES[cur].enter(); }
  const ph = PHASES[cur];
  const p = ph.dur === Infinity ? 0 : clamp((playT - ph.start) / ph.dur, 0, 1);
  ph.update(playT - ph.start, now, p);
  updateAssets(now);
  window.__dbg = { playT: Math.round(playT), cur, phase: ph.name, dt: Math.round(dt) };
  composer.render();
}
jumpTo(0);
requestAnimationFrame(frame);
</script>
