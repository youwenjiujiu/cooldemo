<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Island Grid — Singapore Energy Intelligence</title>
<script src="config.js"></script>
<script>
  // pick the GL library by token: Mapbox when MAPBOX_TOKEN is set, MapLibre otherwise
  const USE_MAPBOX = typeof MAPBOX_TOKEN !== "undefined" && !!MAPBOX_TOKEN;
  const GL_LIB = USE_MAPBOX
    ? { js: "https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.js",
        css: "https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.css" }
    : { js: "https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js",
        css: "https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" };
  document.write(`<link href="${GL_LIB.css}" rel="stylesheet">` +
    `<script src="${GL_LIB.js}"><\/script>`);
</script>
<style>
:root {
  --cyan: #38e1d6; --amber: #ffb84d; --violet: #8c9aff;
  --text: #eaf6f8; --muted: #7e93a3;
}
html, body { margin: 0; height: 100%; background: #05080d; overflow: hidden;
  font-family: "Space Grotesk", "Avenir Next", -apple-system, "Segoe UI", system-ui, sans-serif;
  color: var(--text); }
#map { position: absolute; inset: 0; }
.maplibregl-ctrl-attrib { background: rgba(5,8,13,.5) !important; }
.maplibregl-ctrl-attrib a { color: #5a6b78 !important; font-size: 10px; }
#vignette { position: absolute; inset: 0; pointer-events: none; z-index: 5;
  box-shadow: inset 0 0 220px 40px rgba(0,0,0,.45); }

/* title */
/* persistent page header — this is a product page, not a film */
#brand { position: absolute; top: 18px; left: 22px; z-index: 15; pointer-events: none;
  background: rgba(8, 14, 22, .72); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(120, 200, 220, .16); border-radius: 10px; padding: 10px 16px; }
#brand .b1 { font-size: 13px; font-weight: 700; color: #fff; letter-spacing: .14em; }
#brand .b1 b { color: var(--cyan); }
#brand .b2 { font-size: 10px; letter-spacing: .22em; color: var(--muted);
  text-transform: uppercase; margin-top: 3px; }

/* cinematic captions */
#caption { position: absolute; left: 50%; bottom: 10%; transform: translateX(-50%);
  max-width: 880px; width: 92vw; text-align: center; z-index: 10; pointer-events: none; }
#caption .line { font-size: clamp(17px, 2.1vw, 26px); font-weight: 500; letter-spacing: .06em;
  line-height: 1.5; color: var(--text); opacity: 0; transform: translateY(14px);
  transition: opacity .9s ease, transform .9s cubic-bezier(.16,1,.3,1);
  text-shadow: 0 2px 24px rgba(0,0,0,.95), 0 0 40px rgba(56,225,214,.18); }
#caption .line.in { opacity: 1; transform: translateY(0); }
#caption .line em { font-style: normal; color: var(--cyan); }
#caption .line b { font-weight: 600; color: var(--amber); }

/* DATA / OUTCOME floating side panels — sci-fi HUD cards, content follows the storyline */
.side { position: absolute; top: 50%; width: 276px; z-index: 11; pointer-events: none;
  padding: 18px 18px 16px; overflow: hidden;
  background: linear-gradient(165deg, rgba(12, 22, 34, .88), rgba(7, 13, 21, .72));
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(86, 225, 230, .3);
  clip-path: polygon(16px 0, 100% 0, 100% calc(100% - 16px), calc(100% - 16px) 100%, 0 100%, 0 16px);
  box-shadow: 0 0 36px rgba(56, 225, 214, .14), inset 0 0 30px rgba(56, 225, 214, .05);
  opacity: 0; transition: opacity .7s ease, transform .7s cubic-bezier(.16,1,.3,1); }
#panel-data { left: 26px; transform: translate(-18px, -50%); }
#panel-outcome { right: 26px; transform: translate(18px, -50%); }
.side.in { opacity: 1; transform: translate(0, -50%); }
.side::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--cyan), transparent);
  background-size: 200% 100%; animation: hud-shimmer 3s linear infinite; }
#panel-outcome::before { background: linear-gradient(90deg, transparent, var(--amber), transparent);
  background-size: 200% 100%; }
.side::after { content: ""; position: absolute; left: 0; right: 0; height: 34%;
  top: -40%; pointer-events: none;
  background: linear-gradient(180deg, transparent, rgba(140, 255, 246, .07), transparent);
  animation: hud-scan 4.5s ease-in-out infinite; }
@keyframes hud-shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }
@keyframes hud-scan { 0% { top: -40%; } 60%, 100% { top: 110%; } }
.side .s-head { font-size: 10.5px; letter-spacing: .26em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
.side .s-head::before { content: ""; width: 7px; height: 7px; border-radius: 50%;
  background: var(--cyan); box-shadow: 0 0 10px var(--cyan);
  animation: livepulse 1.4s ease-in-out infinite; }
@keyframes livepulse { 50% { opacity: .3; } }
#panel-outcome .s-head::before { background: var(--amber); box-shadow: 0 0 10px var(--amber); }
.side .s-head b { color: var(--cyan); font-weight: 700; }
#panel-outcome .s-head b { color: var(--amber); }
.side .s-mod { display: inline-block; font-size: 12px; font-weight: 700; color: #05121a;
  letter-spacing: .08em; margin-bottom: 12px; padding: 4px 12px;
  background: linear-gradient(90deg, var(--cyan), #7ffcf0);
  box-shadow: 0 0 18px rgba(56, 225, 214, .45);
  clip-path: polygon(6px 0, 100% 0, calc(100% - 6px) 100%, 0 100%); }
#panel-outcome .s-mod { background: linear-gradient(90deg, var(--amber), #ffd9a0);
  box-shadow: 0 0 18px rgba(255, 184, 77, .45); }
.side ul { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 7px; }
.side li { font-size: 13px; line-height: 1.4; color: var(--text);
  padding: 6px 9px 6px 11px; border-left: 2px solid transparent; border-radius: 3px;
  opacity: 0; transform: translateX(-16px);
  transition: opacity .5s ease, transform .5s cubic-bezier(.16,1,.3,1); }
#panel-outcome li { transform: translateX(16px); }
.side.in li { opacity: 1; transform: translateX(0); }
.side.in li.dim { opacity: .28; }
.side li:not(.dim) { border-left-color: var(--cyan);
  background: linear-gradient(90deg, rgba(56, 225, 214, .14), rgba(56, 225, 214, .02));
  box-shadow: inset 1px 0 8px rgba(56, 225, 214, .12); }
#panel-outcome li:not(.dim) { border-left-color: var(--amber);
  background: linear-gradient(90deg, rgba(255, 184, 77, .15), rgba(255, 184, 77, .02));
  box-shadow: inset 1px 0 8px rgba(255, 184, 77, .12); }
.side li .t { font-weight: 600; letter-spacing: .02em; }
.side li:not(.dim) .t::after { content: "\25C2 LIVE"; float: right; font-size: 8.5px;
  letter-spacing: .18em; color: var(--cyan); opacity: .85; margin-top: 3px; }
#panel-outcome li:not(.dim) .t::after { content: "\25B8"; color: var(--amber); font-size: 11px; }
.side li small { display: block; font-size: 11px; color: var(--muted); margin-top: 2px;
  line-height: 1.4; }

/* OUTCOME panel — holographic 3D cards: the whole panel breathes in perspective,
   live outcomes fly in as 3D plates, float, and run a light sweep */
#panel-outcome.in { animation: holo-panel 8s ease-in-out infinite; }
@keyframes holo-panel {
  0%, 100% { transform: translate(0, -50%) perspective(900px) rotateY(-6deg); }
  50%      { transform: translate(0, -50%) perspective(900px) rotateY(1deg); } }
#panel-outcome ul { perspective: 640px; }
#panel-outcome li { transform: translateX(52px) rotateY(-70deg); transform-origin: right center;
  transform-style: preserve-3d; position: relative;
  transition: opacity .65s ease, transform .85s cubic-bezier(.18, 1.4, .3, 1); }
#panel-outcome.in li { transform: translateX(0) rotateY(0); }
#panel-outcome li:not(.dim) > div { animation: holo-float 3.6s ease-in-out infinite;
  transform-style: preserve-3d; }
@keyframes holo-float {
  0%, 100% { transform: translateZ(0) rotateX(0); }
  50%      { transform: translateZ(16px) rotateX(4deg); } }
#panel-outcome li:not(.dim)::after { content: ""; position: absolute; inset: 0;
  pointer-events: none;
  background: linear-gradient(112deg, transparent 34%, rgba(255, 222, 160, .3) 48%,
    transparent 60%);
  background-size: 260% 100%; animation: holo-sheen 2.6s linear infinite; }
@keyframes holo-sheen { from { background-position: 190% 0; } to { background-position: -90% 0; } }
#panel-outcome li:not(.dim) { animation: holo-glow 2.4s ease-in-out infinite; }
@keyframes holo-glow {
  0%, 100% { box-shadow: inset 1px 0 8px rgba(255, 184, 77, .12), 0 0 0 rgba(255, 184, 77, 0); }
  50%      { box-shadow: inset 1px 0 14px rgba(255, 184, 77, .28), 0 6px 22px rgba(255, 184, 77, .3); } }
#panel-outcome li:not(.dim) .t { color: #ffe9c4; text-shadow: 0 0 14px rgba(255, 184, 77, .6); }
#panel-outcome li:not(.dim) .t::after { display: inline-block;
  animation: coin-spin 2.8s cubic-bezier(.5, 0, .3, 1) infinite; }
@keyframes coin-spin { 0% { transform: rotateY(0); } 55%, 100% { transform: rotateY(360deg); } }

/* DATA panel ontology graph — domains as nodes wired into one hub */
#onto { display: block; width: 100%; margin: 2px 0 8px; }
#onto .edge { stroke: rgba(140, 210, 220, .13); stroke-width: 1; fill: none; }
#onto .edge.on { stroke: rgba(73, 255, 239, .55); stroke-width: 1.4;
  stroke-dasharray: 5 7; animation: onto-flow 1.1s linear infinite; }
@keyframes onto-flow { to { stroke-dashoffset: -12; } }
#onto .nd { fill: #22333f; stroke: rgba(140, 210, 220, .3); stroke-width: 1; }
#onto .nd.on { fill: var(--cyan); stroke: rgba(160, 255, 248, .9);
  filter: drop-shadow(0 0 5px rgba(73, 255, 239, .9));
  animation: onto-pulse 1.6s ease-in-out infinite; }
@keyframes onto-pulse { 50% { filter: drop-shadow(0 0 11px rgba(73, 255, 239, 1)); } }
#onto .lbl { font-size: 11px; font-weight: 600; fill: rgba(190, 210, 218, .38);
  letter-spacing: .04em; }
#onto .lbl.on { fill: #eafffc; }
#onto .leaf { font-size: 8.5px; fill: rgba(73, 255, 239, .85); letter-spacing: .06em; }
#onto .hub { fill: rgba(56, 225, 214, .1); stroke: var(--cyan); stroke-width: 1.2;
  filter: drop-shadow(0 0 8px rgba(56, 225, 214, .5)); }
#onto .hub-ring { fill: none; stroke: rgba(73, 255, 239, .35); stroke-width: 1;
  stroke-dasharray: 3 5; transform-origin: 120px 96px; animation: onto-spin 14s linear infinite; }
@keyframes onto-spin { to { transform: rotate(360deg); } }
#onto .hub-t { font-size: 9.5px; font-weight: 700; fill: #eafffc; letter-spacing: .1em;
  text-anchor: middle; }
#onto .hub-s { font-size: 7px; fill: rgba(160, 230, 235, .7); letter-spacing: .3em;
  text-anchor: middle; }
#onto .pulse { fill: #bffff8; filter: drop-shadow(0 0 4px rgba(73, 255, 239, 1)); }

/* location tag (small eyebrow above captions during close-ups) */
#loctag { position: absolute; left: 50%; bottom: calc(10% + 74px); transform: translateX(-50%);
  font-size: 11px; letter-spacing: .3em; text-transform: uppercase; color: var(--amber);
  z-index: 10; opacity: 0; transition: opacity .8s ease; pointer-events: none;
  text-shadow: 0 2px 16px rgba(0,0,0,.9); }
#loctag.in { opacity: .95; }

/* finale */
#finale { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center;
  justify-content: center; text-align: center; z-index: 12; pointer-events: none;
  background: rgba(3,6,10,.45); opacity: 0; transition: opacity 1.4s ease; }
#finale.in { opacity: 1; }
#finale h2 { font-size: clamp(28px, 4vw, 54px); font-weight: 700; margin: 0 0 14px; color: #fff;
  letter-spacing: .02em; text-shadow: 0 0 50px rgba(56,225,214,.4); }
#finale .tag { color: var(--muted); font-size: clamp(13px, 1.5vw, 17px); letter-spacing: .1em;
  margin-bottom: 42px; }
#outcomes-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px 30px;
  margin-bottom: 38px; }
#outcomes-row span { font-size: 17px; font-weight: 600; color: var(--cyan); letter-spacing: .06em;
  display: flex; align-items: center; gap: 10px; }
#outcomes-row span::after { content: "·"; color: var(--muted); margin-left: 20px; }
#outcomes-row span:last-child::after { content: ""; }
#clients { display: flex; flex-wrap: wrap; justify-content: center; gap: 14px 34px; max-width: 900px; }
#clients span { font-size: 15px; letter-spacing: .18em; text-transform: uppercase; color: var(--text);
  opacity: 0; transform: translateY(10px); transition: opacity .6s ease, transform .6s ease;
  display: flex; align-items: center; gap: 10px; }
#clients span::before { content: ""; width: 5px; height: 5px; border-radius: 50%;
  background: var(--cyan); box-shadow: 0 0 8px var(--cyan); }
#clients span.in { opacity: .95; transform: translateY(0); }

/* Changi / CBD DOM bloom */
.bloom { position: absolute; border-radius: 50%; pointer-events: none; z-index: 8;
  transform: translate(-50%,-50%) scale(0); transition: transform 1.4s ease; }
.bloom.on { transform: translate(-50%,-50%) scale(1); }
#bloom-changi { width: 420px; height: 420px;
  background: radial-gradient(circle, rgba(255,184,77,.30) 0%, rgba(255,184,77,.10) 40%, transparent 70%); }
#bloom-cbd { width: 520px; height: 520px;
  background: radial-gradient(circle, rgba(0,255,240,.22) 0%, rgba(56,225,214,.08) 42%, transparent 70%); }

/* controls */
#replay { position: absolute; bottom: 34px; left: 50%; transform: translateX(-50%);
  background: rgba(56,225,214,.08); color: var(--cyan); border: 1px solid rgba(56,225,214,.45);
  border-radius: 26px; padding: 11px 34px; font-size: 13px; letter-spacing: .2em; cursor: pointer;
  font-family: inherit; text-transform: uppercase; z-index: 20; opacity: 0; pointer-events: none;
  transition: opacity 1s ease, background .3s; }
#replay.in { opacity: 1; pointer-events: auto; }
#replay:hover { background: rgba(56,225,214,.2); }
#skip { position: absolute; bottom: 20px; right: 24px; background: none; border: none;
  color: var(--muted); font-family: inherit; font-size: 11px; letter-spacing: .18em;
  text-transform: uppercase; cursor: pointer; z-index: 20; opacity: .55; }
#skip:hover { opacity: 1; color: var(--cyan); }

@media (prefers-reduced-motion: reduce) {
  * { transition-duration: .01s !important; animation-duration: .01s !important; }
}
</style>
</head>
<body>
<div id="map"></div>
<div id="vignette"></div>
<div id="bloom-changi" class="bloom"></div>
<div id="bloom-cbd" class="bloom"></div>

<div id="brand">
  <div class="b1"><b>univers</b> · AIP for Physical Infrastructure</div>
  <div class="b2">The built environment, run as one</div>
</div>

<aside id="panel-data" class="side">
  <div class="s-head"><b>DATA</b> · what we sense</div>
  <div class="s-mod"></div>
  <div id="onto-wrap"></div>
  <ul></ul>
</aside>
<aside id="panel-outcome" class="side">
  <div class="s-head"><b>OUTCOME</b> · what we deliver</div>
  <div class="s-mod"></div>
  <ul></ul>
</aside>

<div id="loctag"></div>
<div id="caption"><div class="line" id="cap-line"></div></div>

<button id="replay">Replay</button>
<button id="skip">Skip ▸▸</button>

<script>
/* =============================== DATA =============================== */
const SITES = [
  { id: 0,  key: "changi",  org: "Changi Airport",  coords: [103.9865, 1.3644] },
  { id: 1,  key: "dbs",     org: "DBS",             coords: [103.8540, 1.2790] },
  { id: 2,  key: "ocbc",    org: "OCBC",            coords: [103.8492, 1.2846] },
  { id: 3,  key: "ngs",     org: "NGS",             coords: [103.8513, 1.2903] },
  { id: 4,  key: "frasers", org: "Frasers",         coords: [103.8465, 1.2770] },
  { id: 5,  key: "with",    org: "WITH",            coords: [103.8450, 1.2815] },
  { id: 6,  key: "psa",     org: "PSA",             coords: [103.8030, 1.2740] },
  { id: 7,  key: "mse",     org: "MSE",             coords: [103.8320, 1.3110] },
  { id: 8,  key: "hdb",     org: "HDB",             coords: [103.8490, 1.3330] },
  { id: 9,  key: "stengg",  org: "ST Engineering",  coords: [103.8510, 1.3790] },
  { id: 10, key: "htx",     org: "HTX",             coords: [103.7880, 1.3070] },
];
// mock portfolio spread across the whole island (visual scale; not real clients)
const MOCK_SITES = [
  { org: "Tuas Mega Port",             coords: [103.6480, 1.2830] },
  { org: "Jurong Island Energy Hub",   coords: [103.7000, 1.2660] },
  { org: "Jurong Logistics Campus",    coords: [103.7430, 1.3340] },
  { org: "NTU Smart Campus",           coords: [103.6830, 1.3480] },
  { org: "Tengah Eco Town",            coords: [103.7160, 1.3740] },
  { org: "Kranji AgriTech Park",       coords: [103.7620, 1.4250] },
  { org: "Woodlands Health Campus",    coords: [103.7860, 1.4370] },
  { org: "Sembawang Shipyard",         coords: [103.8200, 1.4490] },
  { org: "Yishun Community Hub",       coords: [103.8350, 1.4290] },
  { org: "Mandai Wildlife Reserve",    coords: [103.7890, 1.4040] },
  { org: "Seletar Aerospace Park",     coords: [103.8670, 1.4100] },
  { org: "Punggol Digital District",   coords: [103.9060, 1.4050] },
  { org: "Sengkang Grid Cluster",      coords: [103.8950, 1.3920] },
  { org: "Pasir Ris Central",          coords: [103.9490, 1.3730] },
  { org: "Tampines Regional Centre",   coords: [103.9450, 1.3540] },
  { org: "Changi Business Park",       coords: [103.9640, 1.3340] },
  { org: "Expo & Convention Centre",   coords: [103.9610, 1.3350] },
  { org: "Bedok Integrated Complex",   coords: [103.9300, 1.3240] },
  { org: "Paya Lebar Quarter",         coords: [103.8930, 1.3180] },
  { org: "Kallang Sports Hub",         coords: [103.8740, 1.3040] },
  { org: "Orchard Retail Belt",        coords: [103.8320, 1.3040] },
  { org: "one-north Innovation Park",  coords: [103.7870, 1.2990] },
  { org: "Mapletree Business City",    coords: [103.7990, 1.2760] },
  { org: "Sentosa Resorts",            coords: [103.8300, 1.2490] },
].map((m, i) => ({ ...m, id: SITES.length + i, key: "mock" + i, tier: "mock" }));
SITES.forEach((s) => { s.tier = "hero"; });
const ALL_SITES = [...SITES, ...MOCK_SITES];

const CHANGI = SITES[0].coords;
const DBS_TOWER = SITES[1].coords; // the story starts on this ONE tower
const CBD = [103.8500, 1.2825];

/* All narrative is text — no numeric stats anywhere. */
const CAPS = {
  city:    'Every building on this island consumes energy — <em>most of it for cooling</em>.',
  ee1:     '<b>EE</b> — it starts with <b>one tower</b>: our AI retunes its cooling plant <em>in real time</em> —',
  ee2:     '— sensing occupancy, weather, tariffs — <em>every floor, every hour, every shift</em>.',
  em1:     '<b>EM</b> — then the towers around it join — <em>streaming into one live picture</em>.',
  em2:     'Waste surfaces. Buildings benchmark against buildings. <em>Nothing hides.</em>',
  ioc1:    '<b>IoC</b> — from one tower, to a portfolio, to <em>an island-wide control fabric</em>.',
  ioc2:    'A chiller fault at <b>Tampines</b> — FDD flags it, diagnoses it, <em>resolves it remotely</em>.',
  fabric:  'Together they run as one — <em>sense, predict, decide, act</em> — across the whole city.',
};

/* DATA / OUTCOME side panels — fixed slide vocabulary; each module lights up
   the dimensions it touches and annotates them. */
const DATA_ITEMS = ["Energy", "Assets", "People", "Space", "Environment"];
const OUTCOME_ITEMS = ["Energy bill 8–15% ↓", "Capex deferred ↓", "OPEX leaner ↓", "Space & NOI higher ↑"];
const PANELS = {
  ee: {
    mod: "EE · HVAC Optimization",
    data: {
      Energy: "chiller plant telemetry — load, kW/RT",
      People: "occupancy & footfall, floor by floor",
      Environment: "weather & wet-bulb forecast",
    },
    outcome: { "Energy bill 8–15% ↓": "cooling retuned in real time" },
  },
  em: {
    mod: "EM · Energy Monitoring",
    data: {
      Energy: "every utility & sub-meter, plus solar",
      Assets: "one ontology across the portfolio",
      Space: "tenant & floor submetering",
    },
    outcome: {
      "Energy bill 8–15% ↓": "savings measured & verified",
      "OPEX leaner ↓": "waste & anomalies surfaced",
    },
  },
  ioc: {
    mod: "IoC · Integration of Control",
    data: {
      Energy: "live control states, island-wide",
      Assets: "every BMS point, every protocol — FDD fault signatures",
      People: "comfort held while control shifts",
    },
    outcome: {
      "OPEX leaner ↓": "reactive → predictive maintenance",
      "Capex deferred ↓": "equipment runs longer, replaced later",
      "Space & NOI higher ↑": "uptime, comfort, resilience",
    },
  },
};
// knowledge-graph view of the DATA side: the five domains are nodes wired into
// one ontology hub; the module's live domains glow and stream pulses inward
const ONTO_HUBS = { ee: "DBS TOWER", em: "CBD PORTFOLIO", ioc: "ISLAND GRID" };
function ontoGraph(key, active) {
  const C = [120, 96], R = 66;
  const nodes = DATA_ITEMS.map((t, i) => {
    const a = -Math.PI / 2 + i * (2 * Math.PI / 5);
    return { t, on: !!active[t], x: C[0] + R * Math.cos(a), y: C[1] + R * Math.sin(a) };
  });
  const edges = nodes.map((n) => {
    const cls = n.on ? "edge on" : "edge";
    const pulse = n.on ? `<circle class="pulse" r="2.2">
      <animateMotion dur="1.6s" repeatCount="indefinite"
        path="M ${n.x} ${n.y} L ${C[0]} ${C[1]}"/></circle>` : "";
    return `<line class="${cls}" x1="${n.x}" y1="${n.y}" x2="${C[0]}" y2="${C[1]}"/>${pulse}`;
  }).join("");
  const dots = nodes.map((n) => {

function arcCoords(h, a, steps = 56) {
  const dx = a[0] - h[0], dy = a[1] - h[1];
  const d = Math.hypot(dx, dy) || 1e-9;
  const nx = -dy / d, ny = dx / d, k = 0.26 * d;
  const c = [(h[0] + a[0]) / 2 + nx * k, (h[1] + a[1]) / 2 + ny * k];
  const pts = [];
  for (let i = 0; i <= steps; i++) {
    const t = i / steps, u = 1 - t;
    pts.push([u*u*h[0] + 2*u*t*c[0] + t*t*a[0], u*u*h[1] + 2*u*t*c[1] + t*t*a[1]]);
  }
  return pts;
}
// island-wide mesh: every asset links to its nearest neighbours — a web, not a hub
const MESH_EDGES = (() => {
  const edges = [], seen = new Set();
  ALL_SITES.forEach((s, i) => {
    ALL_SITES.map((t, j) => ({ j, d: Math.hypot(t.coords[0] - s.coords[0], t.coords[1] - s.coords[1]) }))
      .filter((x) => x.j !== i)
      .sort((a, b) => a.d - b.d)
      .slice(0, 2)
      .forEach(({ j }) => {
        const key = Math.min(i, j) + "-" + Math.max(i, j);
        if (!seen.has(key)) { seen.add(key); edges.push([i, j]); }
      });
  });
  return edges;
})();
const ARCS = MESH_EDGES.map(([a, b]) => arcCoords(ALL_SITES[a].coords, ALL_SITES[b].coords));

function retoneTag(tag, tone) { // e.g. FDD fault (amber) → resolved (cyan)

function lightBuildingsAt(lngLat, tone, radiusPx = 110, maxMeters = 150, tag = "") {
  try {
    const p = map.project(lngLat);
    const feats = map.queryRenderedFeatures(
      [[p.x - radiusPx, p.y - radiusPx], [p.x + radiusPx, p.y + radiusPx]], { layers: ["bld-3d"] });
    const degLat = maxMeters / 110574;
    const degLng = maxMeters / 111320;
    const near = (ring) => ring.some(([x, y]) =>
      Math.abs(x - lngLat[0]) < degLng && Math.abs(y - lngLat[1]) < degLat);
    // buffer each ring ~10m outward along its edge normals: the glow shell
    // must clear the base facade by whole meters on EVERY wall (centroid
    // scaling fails on long slabs and concave footprints) or its side faces
    // lose the depth test to the base building and only the roof reads lit
    const PAD = 10 / 110574; // ~10 m in degrees (Singapore ≈ equator, lng ≈ lat)
    const inflate = (poly) => poly.map((ring) => {
      const pts = ring.slice(0, -1); // drop the closing duplicate
      const n = pts.length;
      if (n < 3) return ring;
      let area = 0;
      for (let i = 0; i < n; i++) {
        const [x1, y1] = pts[i], [x2, y2] = pts[(i + 1) % n];
        area += x1 * y2 - x2 * y1;
      }
      const sgn = area > 0 ? 1 : -1; // outward normal flips with winding
      const out = pts.map((p, i) => {
        const prev = pts[(i - 1 + n) % n], next = pts[(i + 1) % n];
        const norm = (a, b) => {
          const dx = b[0] - a[0], dy = b[1] - a[1], l = Math.hypot(dx, dy) || 1;
          return [sgn * dy / l, -sgn * dx / l];
        };
        const [ax, ay] = norm(prev, p), [bx, by] = norm(p, next);
        let mx = ax + bx, my = ay + by;
        const ml = Math.hypot(mx, my);
        if (ml < 0.35) { mx = ax; my = ay; } // near-reversal: fall back to one edge
        else { mx /= ml; my /= ml; }
        const scale = Math.min(2.5, 2 / Math.max(0.8, ml)); // miter, clamped
        return [p[0] + mx * PAD * scale, p[1] + my * PAD * scale];
      });
      out.push(out[0]);
      return out;
    });
    // flatten to individual footprints, one candidate per polygon per slice
    // (tiles merge many footprints into one (Multi)Polygon, and tall towers
    // arrive as stacked min_height → height bands sharing one footprint)
    const cands = [];
    feats.forEach((f) => {
      const polys = f.geometry.type === "Polygon" ? [f.geometry.coordinates]
        : f.geometry.type === "MultiPolygon" ? f.geometry.coordinates : [];
      const pr = f.properties || {};
      const b0 = pr.render_min_height ?? pr.min_height ?? 0;
      const h0 = pr.render_height ?? pr.height ?? 8;
      polys.forEach((poly) => cands.push({ poly, b0, h0 }));
    });
    // pass 1: seed with footprints near the site point
    const kept = cands.map((c) => near(c.poly[0]));
    // pass 2: adopt slices standing on or against anything already lit — a
    // complex is podium + towers in separate features, and a tower whose
    // podium made the seed radius must not stay dark above a glowing base
    const CELL = 30 / 110574; // ~30 m adjacency
    const cellKey = (x, y) => `${Math.round(x / CELL)},${Math.round(y / CELL)}`;
    const grid = new Set();
    cands.forEach((c, i) => {
      if (kept[i]) c.poly[0].forEach(([x, y]) => grid.add(cellKey(x, y)));
    });
    const touchesLit = (ring) => ring.some(([x, y]) => {
      const cx = Math.round(x / CELL), cy = Math.round(y / CELL);
      for (let dx = -1; dx <= 1; dx++) for (let dy = -1; dy <= 1; dy++)
        if (grid.has(`${cx + dx},${cy + dy}`)) return true;
      return false;
    });
    cands.forEach((c, i) => { if (!kept[i] && touchesLit(c.poly[0])) kept[i] = true; });
    cands.forEach((c, i) => {
      if (!kept[i]) return;
      // the slice band is part of the dedup key, or every band above the
      // first would be dropped and the tower would light up with gaps
      const key = `${JSON.stringify(c.poly[0][0])}|${tone}|${c.b0}|${c.h0}`;
      if (litSeen.has(key)) return;
      litSeen.add(key);
      litFeatures.push({ type: "Feature", properties: {
          tone, tag,
          h: Math.min(320, c.h0) + 3,
          b: c.b0,
        }, geometry: { type: "MultiPolygon", coordinates: [inflate(c.poly)] } });
    });
    map.getSource("lit-bld")?.setData({ type: "FeatureCollection", features: litFeatures });
  } catch (e) { /* DOM bloom still carries the moment */ }
}

        $("#bloom-cbd").classList.add("on");
        loctag("EM · Portfolio Energy Monitoring");
        showPanels("em");
      }
      if (ms > 4300 && !this._c1) { this._c1 = true; caption(CAPS.em1); }
      if (ms > 4600 && !this._drift) {
        this._drift = true;
        map.easeTo({ bearing: -12, duration: dur(9800), easing: (t) => t });
      }
      if (ms > 9600 && !this._c2) { this._c2 = true; caption(CAPS.em2); }
      if (ms > 13600) { captionOut(); loctag(""); }
      pinBloom($("#bloom-cbd"), CBD);
    },
    exit() { this._c1 = this._c2 = false;
      captionOut(); loctag(""); hidePanels();
      $("#bloom-cbd").classList.remove("on"); } },

  { name: "island", dur: 17000,
    enter() {
      map.stop();
      unlightBuildings();
      map.flyTo({ center: [103.8520, 1.3180], zoom: 11.35, pitch: 50, bearing: -8,
        duration: dur(4200), curve: 1.35, easing: easeInOutCubic });
      caption("");
      this._c1 = false; this._orbit = false;
      this._fault = this._fixed = false;
      arcProgress = ARCS.map(() => 0);
      map.setPaintProperty("arc-flow", "line-opacity", 0);
      this._flow = false;
    },
    update(ms, now) {
      // point → plane: a single wavefront radiates out of the CBD; every asset
      // ignites the moment the wave reaches it (delay ∝ distance from DBS)
      ALL_SITES.forEach((s) => {
        const d = Math.hypot(s.coords[0] - CBD[0], s.coords[1] - CBD[1]);
        if (ms > 3000 + d * 24000) igniteSite(s.id);
      });
      if (ms > 4400 && !this._c1) { this._c1 = true; caption(CAPS.ioc1);
        loctag("IoC · Integration of Control"); showPanels("ioc"); }
      if (ms > 5400 && !this._orbit) {
        this._orbit = true;
        map.easeTo({ bearing: -2, duration: dur(9200), easing: (t) => t });
      }
      // FDD moment: a fault flares amber at Tampines, is diagnosed, resolves
      if (ms > 10400 && !this._fault) { this._fault = true;
        setFault(FDD_SITE.id, true); caption(CAPS.ioc2); }
      if (ms > 14400 && !this._fixed) { this._fixed = true;
        setFault(FDD_SITE.id, false); caption(CAPS.fabric); }
      // arcs shoot from Changi to every asset
      let changed = false;
      ARCS.forEach((_, i) => {
        const p = clamp((ms - 7600 - i * 120) / 700, 0, 1);
        const e = easeOut(p);
        if (e !== arcProgress[i]) { arcProgress[i] = e; changed = true; }
      });
      if (changed) setArcData();
      if (!this._flow && arcProgress.every((p) => p >= 1)) {
        this._flow = true;
        map.setPaintProperty("arc-flow", "line-opacity", 0.9);
      }
      if (this._flow) tickDashFlow(now);
    },
    exit() {
      allSitesOn();
      setFault(FDD_SITE.id, false);
      arcProgress = ARCS.map(() => 1); setArcData();
      map.setPaintProperty("arc-flow", "line-opacity", 0.9);
      captionOut(); loctag(""); hidePanels();
    } },

  { name: "finale", dur: Infinity,
    enter() {
      map.stop();
      map.easeTo({ center: [103.8520, 1.3180], zoom: 11.2, pitch: 52, bearing: 40,
        duration: dur(26000), easing: (t) => t });
      // clean ending: no text overlay, just the living map and a Replay control
      this._timers = [setTimeout(() => $replay.classList.add("in"), 2400)];
      this._swung = false;
    },
    update(ms, now) {
      tickDashFlow(now);
      if (ms > 26500 && !this._swung) { // keep the world slowly turning forever
        this._swung = true;
        map.easeTo({ bearing: -20, duration: dur(30000), easing: (t) => t });
      }
      if (ms > 57000) this._swung = false;
    },
    exit() {
      (this._timers || []).forEach(clearTimeout);
      $replay.classList.remove("in");
    } },
];
PHASES.reduce((acc, ph) => { ph.start = acc; return acc + ph.dur; }, 0);

/* =============================== ENGINE =============================== */
let playT = 0, cur = -1, last = performance.now();

function resetWorld() {
  map.stop();
  unlightBuildings();
  allSitesOff();
  arcProgress = ARCS.map(() => 0); setArcData();
  if (map.getLayer("arc-flow")) map.setPaintProperty("arc-flow", "line-opacity", 0);
  ["#bloom-changi", "#bloom-cbd"].forEach((s) => $(s).classList.remove("on"));
  setFault(FDD_SITE.id, false);
  captionOut(); loctag(""); hidePanels();
}
function jumpTo(idx) {
  idx = clamp(idx, 0, PHASES.length - 1);
  popsEnabled = false; // no shockwave spam when rebuilding pre-state
  if (cur >= 0) PHASES[cur].exit();
  resetWorld();
  // world state each phase expects on entry (for skips/replay)
  if (idx >= 2) igniteSite(1); // the DBS origin tower
  if (idx >= 3) ["dbs","ocbc","ngs","frasers","with"].forEach((k) =>
    igniteSite(SITES.find((s) => s.key === k).id));
  if (idx >= 4) { allSitesOn(); arcProgress = ARCS.map(() => 1); setArcData();
    map.setPaintProperty("arc-flow", "line-opacity", 0.9); }
  playT = PHASES[idx].start;
  cur = idx;
  PHASES[idx].enter();
  popsEnabled = true;
}
$replay.onclick = () => jumpTo(0);
$("#skip").onclick = () => jumpTo(cur + 1);

function frame(now) {
  requestAnimationFrame(frame);
  const dt = clamp(now - last, 0, 100); // first RAF timestamp can precede `last`
  last = now;
  playT = Math.max(0, playT + dt);
  let idx = 0;
  for (let i = PHASES.length - 1; i >= 0; i--) if (playT >= PHASES[i].start) { idx = i; break; }
  if (idx !== cur) { if (cur >= 0) PHASES[cur].exit(); cur = idx; PHASES[cur].enter(); }
  const ph = PHASES[cur];
  ph.update(playT - ph.start, now);

  // pulsing rings on lit sites
  if (map.getLayer("site-pulse") && sitesOn > 0) {
    const phse = (now % 1400) / 1400;
    const on = ["boolean", ["feature-state", "on"], false];
    map.setPaintProperty("site-pulse", "circle-radius", ["case", on, 9 + phse * 26, 0]);
    map.setPaintProperty("site-pulse", "circle-opacity", ["case", on, 0.75 * (1 - phse), 0]);
  }
  window.__dbg = { playT: Math.round(playT), cur, phase: ph.name, dt: Math.round(dt) };
}

map.on("load", () => {
  setupLayers();
  jumpTo(0);
  requestAnimationFrame(frame);
});
</script>
